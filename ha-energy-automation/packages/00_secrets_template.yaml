---
# 00_secrets_template.yaml
# ──────────────────────────────────────────────────────────────────────────────
# COPY THIS FILE to secrets.yaml and fill in your actual values.
# NEVER commit secrets.yaml — it is in .gitignore.
# Reference secrets in other YAML files with !secret key_name
# ──────────────────────────────────────────────────────────────────────────────

# ── SolarEdge Cloud API (optional — used for SolarEdge Cloud integration only)
# How to get: log in to monitoring.solaredge.com → Admin → Site Access
# NOT needed for Modbus Multi — leave placeholder if only using Modbus.
solaredge_site_id: "YOUR_SITE_ID"
solaredge_api_key: "YOUR_API_KEY"

# ── Solcast Solar Forecast API key
# How to get: register free account at toolkit.solcast.com.au
# Free tier: 10 API calls/day (sufficient for HA polling at 30-min intervals)
# Copy your API key from Account → API Key
solcast_api_key: "YOUR_SOLCAST_KEY"

# ── Alfen Eve Wallbox password
# How to get: see documentation from 50five installer or Alfen Eve manual.
# The default installer password is in the Alfen commissioning docs.
# Also referred to as "OCPP password" or "installer code" in some docs.
# See docs/ALFEN_WARNING.md for details on the integration setup.
alfen_password: "YOUR_ALFEN_PASSWORD"

# ── Tesla refresh token
# How to get (recommended: Tesla Fleet API, HA core integration):
#   Settings → Integrations → + Add → Tesla (official)
#   Follow OAuth flow — no manual token needed.
# If using alandtse/tesla_custom (HACS):
#   Use Auth for Tesla app or TeslaAuth.py to generate refresh token.
#   Token expires every 8 weeks — see docs/TESLA_SETUP.md.
tesla_token: "YOUR_TESLA_REFRESH_TOKEN"

# ── HA notification target (mobile app notify service name)
# How to get: install HA Companion app on your phone.
#   Developer Tools → Services → Search for "notify." to find your service name.
# Example values:
#   notify.mobile_app_iphone_van_jan
#   notify.mobile_app_pixel_8
#   notify.mobile_app_samsung_s24
notify_target: "notify.mobile_app_YOUR_PHONE"

# ── HomeWizard P1 meter IP (optional — normally auto-discovered)
# How to get: HomeWizard Energy app → Settings → [device] → Local API → IP address
# Only needed if auto-discovery fails (static IP recommended).
homewizard_p1_host: "192.168.1.XXX"

# ── SolarEdge inverter Modbus IP
# How to get: inverter LCD → Comm → Eth → IP Address
# Assign a static DHCP lease in your router for reliability.
# See docs/SETUP.md Step 1 for why Ethernet is critical.
solaredge_modbus_host: "192.168.1.XXX"

# ── EV charger rated power (kW) — used for EV scheduling calculations
# Alfen Eve Single Pro-line three-phase: 11 kW (3 × 16 A)
# Alfen Eve Single Pro-line single-phase: 7.4 kW (1 × 32 A)
ev_charger_power_kw: "11"

# ── EV battery capacity (kWh) — used for charge hours needed calculation
# Tesla Model 3 Standard Range: 57.5 kWh usable
# Tesla Model 3 Long Range: 75 kWh usable
# Tesla Model Y Long Range: 75 kWh usable
ev_battery_capacity_kwh: "75"
