---
# 04_battery_state_machine.yaml
# ──────────────────────────────────────────────────────────────────────────────
# BATTERY STATE MACHINE — THE CORE OF ALL BATTERY CONTROL
#
# Architecture: Single Writer Pattern
# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM: Seven automations writing to the same Modbus select entity creates
# race conditions — undefined behavior when multiple conditions are true.
#
# SOLUTION: Only ONE automation (the Mode Executor) ever writes to Modbus.
# All other automations write ONLY to input_select.battery_desired_mode.
# The Mode Executor reacts to input_select changes and translates to Modbus writes.
#
# Priority order (highest priority wins):
#   FORCE_DISCHARGE > FORCE_CHARGE > GRID_CHARGE > PEAK_DISCHARGE > HOLD > SELF_CONSUME
#
# See docs/BATTERY_STATE_MACHINE.md for full documentation and ASCII state diagram.
#
# IMPORTANT: Battery control requires:
#   - SolarEdge Home Battery 9.7 installed and commissioned
#   - Home Hub installed and Modbus storage control entities available
#   - binary_sensor.battery_available = true
#   - binary_sensor.modbus_available = true
# ──────────────────────────────────────────────────────────────────────────────

# ── State machine input_select ─────────────────────────────────────────────────
input_select:
  battery_desired_mode:
    name: "Batterij gewenste modus"
    options:
      - SELF_CONSUME
      - GRID_CHARGE
      - PEAK_DISCHARGE
      - HOLD
      - FORCE_CHARGE
      - FORCE_DISCHARGE
    initial: SELF_CONSUME
    icon: mdi:battery-sync
    # SELF_CONSUME   → Maximize Self Consumption (normal operation)
    # GRID_CHARGE    → Charge from PV and AC (cheap/negative price window)
    # PEAK_DISCHARGE → Maximize Export (high price = sell stored energy)
    # HOLD           → Charge from PV Only (EV charging, protect grid capacity)
    # FORCE_CHARGE   → Charge from PV and AC (manual override, same Modbus option)
    # FORCE_DISCHARGE→ Maximize Export (manual override)

# ── Priority resolver sensor ───────────────────────────────────────────────────
template:
  - sensor:
      - name: "battery_active_reason"
        unique_id: battery_active_reason
        icon: mdi:information-outline
        # Human-readable explanation of current battery mode and why.
        # Shown on the dashboard as an audit/status display.
        state: >
          {% set mode = states('input_select.battery_desired_mode') %}
          {% set soc = states('sensor.battery_soc_pct') | float(-1) %}
          {% set price = states('sensor.nord_pool_nl_current_price') | float(999) %}
          {% set fresh = states('sensor.price_freshness_ok') %}
          {% set solar = states('binary_sensor.solar_producing') %}
          {% set ev = states('sensor.alfen_wallbox_active_power_total') | float(0) %}
          {% set modbus = states('binary_sensor.modbus_available') %}
          {% set battery = states('binary_sensor.battery_available') %}
          {% if modbus == 'off' %}
            OFFLINE — Modbus niet beschikbaar
          {% elif battery == 'off' %}
            WACHT — Batterij niet geïnstalleerd/beschikbaar
          {% elif mode == 'FORCE_DISCHARGE' %}
            FORCE_DISCHARGE — Handmatige override: ontladen
          {% elif mode == 'FORCE_CHARGE' %}
            FORCE_CHARGE — Handmatige override: laden
          {% elif mode == 'GRID_CHARGE' %}
            {% if price < 0 %}
              GRID_CHARGE — Negatieve prijs {{ price | round(4) }} €/kWh, SoC {{ soc | round(0) }}%
            {% else %}
              GRID_CHARGE — Goedkope prijs {{ price | round(4) }} €/kWh, SoC {{ soc | round(0) }}%
            {% endif %}
          {% elif mode == 'PEAK_DISCHARGE' %}
            PEAK_DISCHARGE — Piekprijs {{ price | round(4) }} €/kWh, SoC {{ soc | round(0) }}%
          {% elif mode == 'HOLD' %}
            HOLD — EV aan het laden ({{ ev | round(0) }} W), batterij vastgehouden
          {% elif mode == 'SELF_CONSUME' %}
            {% if solar == 'on' %}
              SELF_CONSUME — Zonne-energie: {{ states('sensor.solar_production_kw') | float(0) | round(2) }} kW
            {% elif fresh != 'true' %}
              SELF_CONSUME — Prijsdata verouderd, veilige stand
            {% else %}
              SELF_CONSUME — Normaal bedrijf, prijs {{ price | round(4) }} €/kWh
            {% endif %}
          {% else %}
            {{ mode }} — Onbekend
          {% endif %}

      - name: "battery_mode_priority_resolved"
        unique_id: battery_mode_priority_resolved
        icon: mdi:priority-high
        # Shows the effective mode after priority resolution.
        # Other automations write desired modes; this sensor shows what WOULD win
        # if multiple automations fired simultaneously.
        state: >
          {% set mode = states('input_select.battery_desired_mode') %}
          {{ mode }}
        attributes:
          priority_order: "FORCE_DISCHARGE > FORCE_CHARGE > GRID_CHARGE > PEAK_DISCHARGE > HOLD > SELF_CONSUME"
          modbus_available: "{{ states('binary_sensor.modbus_available') }}"
          battery_available: "{{ states('binary_sensor.battery_available') }}"
          last_action: "{{ states('input_text.battery_last_action') }}"

# ── Mode Executor — THE ONLY AUTOMATION THAT WRITES TO MODBUS ─────────────────
automation:
  - id: battery_mode_executor
    alias: "Batterij: modus executor (enige Modbus schrijver)"
    description: >
      THE SINGLE WRITER. This is the only automation that writes to the
      SolarEdge Modbus storage control entities. All other automations write
      only to input_select.battery_desired_mode.

      Availability guards: if Modbus or battery is unavailable, this automation
      logs the attempt but does NOT write to Modbus (prevents errors).

      Modbus entities:
        select.solaredge_i1_storage_control_mode  → set to "Remote Control"
        select.solaredge_i1_storage_default_mode  → set based on desired mode
    trigger:
      - platform: state
        entity_id: input_select.battery_desired_mode
    condition: []
    action:
      - choose:
          # ── Case: Modbus or battery unavailable → log and abort ──
          - conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: binary_sensor.modbus_available
                    state: "off"
                  - condition: state
                    entity_id: binary_sensor.battery_available
                    state: "off"
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.battery_last_action
                data:
                  value: >
                    {{ now().strftime('%H:%M') }} ⚠️ Modbus/batterij niet beschikbaar — {{ trigger.to_state.state }} NIET uitgevoerd

          # ── Case: Modbus and battery available → execute mode change ──
          - conditions:
              - condition: state
                entity_id: binary_sensor.modbus_available
                state: "on"
              - condition: state
                entity_id: binary_sensor.battery_available
                state: "on"
            sequence:
              # Log the action
              - service: input_text.set_value
                target:
                  entity_id: input_text.battery_last_action
                data:
                  value: >
                    {{ now().strftime('%H:%M') }} → {{ trigger.to_state.state }}: {{ states('sensor.battery_active_reason') }}

              # Step 1: Always set Remote Control mode first
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_control_mode
                data:
                  option: "Remote Control"

              # Step 2: Small delay for Modbus to process
              - delay: "00:00:02"

              # Step 3: Set the appropriate default mode
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_select.battery_desired_mode
                        state: "SELF_CONSUME"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: select.solaredge_i1_storage_default_mode
                        data:
                          option: "Maximize Self Consumption"

                  - conditions:
                      - condition: state
                        entity_id: input_select.battery_desired_mode
                        state: "GRID_CHARGE"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: select.solaredge_i1_storage_default_mode
                        data:
                          option: "Charge from PV and AC"

                  - conditions:
                      - condition: state
                        entity_id: input_select.battery_desired_mode
                        state: "PEAK_DISCHARGE"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: select.solaredge_i1_storage_default_mode
                        data:
                          option: "Maximize Export"

                  - conditions:
                      - condition: state
                        entity_id: input_select.battery_desired_mode
                        state: "HOLD"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: select.solaredge_i1_storage_default_mode
                        data:
                          option: "Charge from PV"

                  - conditions:
                      - condition: state
                        entity_id: input_select.battery_desired_mode
                        state: "FORCE_CHARGE"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: select.solaredge_i1_storage_default_mode
                        data:
                          option: "Charge from PV and AC"

                  - conditions:
                      - condition: state
                        entity_id: input_select.battery_desired_mode
                        state: "FORCE_DISCHARGE"
                    sequence:
                      - service: select.select_option
                        target:
                          entity_id: select.solaredge_i1_storage_default_mode
                        data:
                          option: "Maximize Export"
    mode: queued
    max: 5

  # ── Startup initialization ─────────────────────────────────────────────────
  - id: battery_startup_init
    alias: "Batterij: initialisatie bij HA opstart"
    description: >
      On HA start, sets battery to SELF_CONSUME (safe default) and waits 30
      seconds for all integrations to load before the rule automations take over.
      This prevents the battery from being stuck in a wrong mode after restart.
    trigger:
      - platform: homeassistant
        event: start
    condition: []
    action:
      - delay: "00:00:30"
      - service: input_select.select_option
        target:
          entity_id: input_select.battery_desired_mode
        data:
          option: "SELF_CONSUME"
      - service: input_text.set_value
        target:
          entity_id: input_text.battery_last_action
        data:
          value: >
            {{ now().strftime('%H:%M') }} HA opgestart — batterij ingesteld op SELF_CONSUME
    mode: single
