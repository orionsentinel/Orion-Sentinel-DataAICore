---
# 03_solaredge.yaml
# ──────────────────────────────────────────────────────────────────────────────
# SolarEdge SE10000H derived sensors via SolarEdge Modbus Multi integration.
#
# ⚠️ WIFI MODBUS DEPRECATION WARNING ⚠️
# SolarEdge is actively removing WiFi Modbus support in firmware updates.
# This inverter is currently WiFi-only. The Modbus connection WILL break
# on the next SolarEdge firmware push if Ethernet is not connected first.
# PRIORITY ACTION: Run an Ethernet cable to the inverter.
# See docs/MODBUS_PROXY.md for the interim ha-modbusproxy workaround.
#
# ALL template sensors here include availability guards using | float(default)
# and explicit availability: fields. NEVER act on unavailable Modbus data.
#
# Entity naming convention (SolarEdge Modbus Multi defaults):
#   solaredge_i1_* = Inverter 1
#   solaredge_m1_* = Meter 1 (grid meter wired into inverter)
#   solaredge_b1_* = Battery 1 (NOT YET AVAILABLE — battery not installed)
#
# See docs/ENTITY_NAMES.md for discovery templates and rename guide.
# ──────────────────────────────────────────────────────────────────────────────

template:
  # ── Power sensors (all with availability guards) ────────────────────────────
  - sensor:
      - name: "solar_production_w"
        unique_id: solar_production_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {% set ac = states('sensor.solaredge_i1_ac_power') | float(-1) %}
          {% if ac < 0 %}
            unavailable
          {% else %}
            {{ [ac, 0] | max | round(1) }}
          {% endif %}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "solar_production_kw"
        unique_id: solar_production_kw
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power-variant
        state: >
          {{ (states('sensor.solar_production_w') | float(0) / 1000) | round(3) }}
        availability: >
          {{ states('sensor.solar_production_w') not in ['unavailable', 'unknown', 'none'] }}

      - name: "grid_power_w"
        unique_id: grid_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower
        # Signed: positive = importing from grid, negative = exporting to grid.
        # SolarEdge m1 meter: positive values = import (consumption from grid).
        state: >
          {{ states('sensor.solaredge_m1_ac_power') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "grid_import_w"
        unique_id: grid_import_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {{ [states('sensor.solaredge_m1_ac_power') | float(0), 0] | max | round(1) }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "grid_export_w"
        unique_id: grid_export_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-export
        state: >
          {{ [states('sensor.solaredge_m1_ac_power') | float(0) * -1, 0] | max | round(1) }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "house_consumption_w"
        unique_id: house_consumption_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-lightning-bolt
        # Total house consumption including EV charging.
        # Formula: solar_ac + grid (positive=import) - battery_dc (positive=charging)
        # With battery not installed: house = solar + grid_import - grid_export
        state: >
          {% set solar = states('sensor.solaredge_i1_ac_power') | float(0) %}
          {% set grid = states('sensor.solaredge_m1_ac_power') | float(0) %}
          {% set battery = states('sensor.solaredge_b1_dc_power') | float(0) %}
          {{ [solar + grid - battery, 0] | max | round(1) }}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown', 'none']
             and states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "house_consumption_excl_ev_w"
        unique_id: house_consumption_excl_ev_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-outline
        # House consumption excluding EV charging — useful for sizing analysis.
        # Uses Alfen active power as the EV component.
        state: >
          {% set house = states('sensor.house_consumption_w') | float(0) %}
          {% set ev = states('sensor.alfen_wallbox_active_power_total') | float(0) %}
          {{ [house - ev, 0] | max | round(1) }}
        availability: >
          {{ states('sensor.house_consumption_w') not in ['unavailable', 'unknown', 'none']
             and states('sensor.alfen_wallbox_active_power_total') not in ['unavailable', 'unknown', 'none'] }}

      - name: "solar_self_consumption_pct"
        unique_id: solar_self_consumption_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-circle
        state: >
          {% set solar = states('sensor.solar_production_w') | float(0) %}
          {% set export = states('sensor.grid_export_w') | float(0) %}
          {% if solar > 10 %}
            {{ (((solar - export) / solar) * 100) | round(1) | min(100) }}
          {% else %}
            0
          {% endif %}
        availability: >
          {{ states('sensor.solar_production_w') not in ['unavailable', 'unknown', 'none']
             and states('sensor.grid_export_w') not in ['unavailable', 'unknown', 'none'] }}

      # ── Battery sensors — UNAVAILABLE until Home Battery 9.7 is installed ──
      - name: "battery_soc_pct"
        unique_id: battery_soc_pct
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        icon: mdi:battery
        state: >
          {{ states('sensor.solaredge_b1_state_of_energy') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_b1_state_of_energy') not in ['unavailable', 'unknown', 'none'] }}

      - name: "battery_power_w"
        unique_id: battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        # Positive = charging, negative = discharging
        state: >
          {{ states('sensor.solaredge_b1_dc_power') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_b1_dc_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "battery_energy_remaining_kwh"
        unique_id: battery_energy_remaining_kwh
        unit_of_measurement: "kWh"
        device_class: energy_storage
        state_class: measurement
        icon: mdi:battery-charging-50
        state: >
          {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(0) %}
          {{ ((soc / 100) * 9.7) | round(2) }}
        availability: >
          {{ states('sensor.solaredge_b1_state_of_energy') not in ['unavailable', 'unknown', 'none'] }}
        attributes:
          capacity_kwh: 9.7

      - name: "battery_status"
        unique_id: battery_status
        icon: mdi:battery-sync
        # Human-readable battery status combining status code and power flow.
        # solaredge_b1_status: 1=Off, 2=Empty, 3=Discharging, 4=Charging, 5=Full, 6=Holding, 7=Testing
        state: >
          {% set code = states('sensor.solaredge_b1_status') | int(-1) %}
          {% set pwr = states('sensor.solaredge_b1_dc_power') | float(0) %}
          {% if code == 1 %}Uit
          {% elif code == 2 %}Leeg
          {% elif code == 3 %}Ontladen {{ (pwr * -1) | round(0) }} W
          {% elif code == 4 %}Laden {{ pwr | round(0) }} W
          {% elif code == 5 %}Vol
          {% elif code == 6 %}Holding
          {% elif code == 7 %}Test
          {% else %}Onbekend{% endif %}
        availability: >
          {{ states('sensor.solaredge_b1_status') not in ['unavailable', 'unknown', 'none'] }}

  # ── Binary sensors ──────────────────────────────────────────────────────────
  - binary_sensor:
      - name: "solar_producing"
        unique_id: solar_producing
        device_class: power
        icon: mdi:solar-power
        # Debounced: must be >200W for >2 minutes to prevent cloud-shadow flapping.
        delay_on: "00:02:00"
        state: >
          {{ states('sensor.solaredge_i1_ac_power') | float(0) > 200 }}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "exporting_to_grid"
        unique_id: exporting_to_grid
        device_class: power
        icon: mdi:transmission-tower-export
        state: >
          {{ states('sensor.solaredge_m1_ac_power') | float(0) < -100 }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "modbus_available"
        unique_id: modbus_available
        icon: mdi:connection
        # Primary health indicator for all battery automations.
        # If false: battery automations must NO-OP.
        state: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown', 'none'] }}

      - name: "battery_available"
        unique_id: battery_available
        icon: mdi:battery-check
        # True only after SolarEdge Home Battery 9.7 is installed and Modbus b1 entities appear.
        state: >
          {{ states('sensor.solaredge_b1_state_of_energy') not in ['unavailable', 'unknown', 'none'] }}

      - name: "battery_low"
        unique_id: battery_low
        device_class: battery
        icon: mdi:battery-alert
        state: >
          {% if states('sensor.solaredge_b1_state_of_energy') in ['unavailable', 'unknown', 'none'] %}
            false
          {% else %}
            {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(100) %}
            {% set min_soc = states('input_number.battery_min_soc') | float(20) %}
            {{ soc < min_soc }}
          {% endif %}

# ── Utility meters ─────────────────────────────────────────────────────────────
utility_meter:
  daily_solar_production:
    name: "Dagelijkse zonnepaneel productie"
    source: sensor.solaredge_i1_ac_energy_kwh  # ← replace with your energy entity (kWh)
    cycle: daily

  monthly_solar_production:
    name: "Maandelijkse zonnepaneel productie"
    source: sensor.solaredge_i1_ac_energy_kwh  # ← replace with your energy entity (kWh)
    cycle: monthly

  daily_grid_import:
    name: "Dagelijkse netimport"
    source: sensor.solaredge_m1_imported_kwh  # ← replace with your grid import energy entity
    cycle: daily

  daily_grid_export:
    name: "Dagelijkse netexport"
    source: sensor.solaredge_m1_exported_kwh  # ← replace with your grid export energy entity
    cycle: daily

  monthly_grid_import:
    name: "Maandelijkse netimport"
    source: sensor.solaredge_m1_imported_kwh  # ← replace with your grid import energy entity
    cycle: monthly

  monthly_grid_export:
    name: "Maandelijkse netexport"
    source: sensor.solaredge_m1_exported_kwh  # ← replace with your grid export energy entity
    cycle: monthly
