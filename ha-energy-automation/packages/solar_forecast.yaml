---
# solar_forecast.yaml
# Solar production forecasting and battery grid-charge decisions.
# Requires: Forecast.Solar integration (or Solcast via HACS)
# Panel specs: ~4kWp, Netherlands (adjust in integration config)
#
# Forecast.Solar entity names (adjust if using Solcast):
#   sensor.forecast_solar_energy_production_today
#   sensor.forecast_solar_energy_production_tomorrow
#   sensor.forecast_solar_energy_current_hour

input_number:
  solar_sunny_day_threshold:
    name: "Zonnige dag drempelwaarde"
    min: 5
    max: 30
    step: 0.5
    unit_of_measurement: "kWh"
    icon: mdi:weather-sunny
    initial: 15
    # Forecast tomorrow > this value → "sunny day" → disable grid charging

  solar_cloud_day_threshold:
    name: "Bewolkte dag drempelwaarde"
    min: 1
    max: 15
    step: 0.5
    unit_of_measurement: "kWh"
    icon: mdi:weather-cloudy
    initial: 5
    # Forecast tomorrow < this value → "cloudy day" → enable grid charging

template:
  - sensor:
      - name: "tomorrow_category"
        unique_id: tomorrow_category
        icon: mdi:weather-partly-cloudy
        state: >
          {% set forecast = states('sensor.forecast_solar_energy_production_tomorrow') | float(0) %}
          {% set sunny_threshold = states('input_number.solar_sunny_day_threshold') | float(15) %}
          {% set cloudy_threshold = states('input_number.solar_cloud_day_threshold') | float(5) %}
          {% if forecast >= sunny_threshold %}
            sunny
          {% elif forecast > cloudy_threshold %}
            partly_cloudy
          {% else %}
            cloudy
          {% endif %}
        availability: >
          {{ states('sensor.forecast_solar_energy_production_tomorrow') not in ['unavailable', 'unknown', 'none'] }}
        attributes:
          forecast_kwh: >
            {{ states('sensor.forecast_solar_energy_production_tomorrow') | float(0) | round(1) }}
          sunny_threshold_kwh: >
            {{ states('input_number.solar_sunny_day_threshold') | float(15) }}
          cloudy_threshold_kwh: >
            {{ states('input_number.solar_cloud_day_threshold') | float(5) }}

      - name: "battery_grid_top_up_needed_kwh"
        unique_id: battery_grid_top_up_needed_kwh
        unit_of_measurement: "kWh"
        state_class: measurement
        icon: mdi:battery-plus
        # Expected shortfall: average consumption 13.7 kWh/day minus forecast production
        # minus current battery energy remaining
        state: >
          {% set avg_consumption = 13.7 %}
          {% set forecast = states('sensor.forecast_solar_energy_production_tomorrow') | float(0) %}
          {% set battery_kwh = states('sensor.battery_energy_remaining_kwh') | float(0) %}
          {% set shortfall = avg_consumption - forecast - battery_kwh %}
          {{ [shortfall, 0] | max | round(2) }}
        availability: >
          {{ states('sensor.forecast_solar_energy_production_tomorrow') not in ['unavailable', 'unknown', 'none']
             and states('sensor.battery_energy_remaining_kwh') not in ['unavailable', 'unknown', 'none'] }}
        attributes:
          avg_daily_consumption_kwh: 13.7
          forecast_kwh: >
            {{ states('sensor.forecast_solar_energy_production_tomorrow') | float(0) | round(2) }}
          battery_kwh: >
            {{ states('sensor.battery_energy_remaining_kwh') | float(0) | round(2) }}

      - name: "solar_peak_time_today"
        unique_id: solar_peak_time_today
        icon: mdi:clock-time-twelve-outline
        state: >
          {# Estimate solar peak time based on current hour production data #}
          {# Forecast.Solar provides hourly breakdown in forecast attribute #}
          {% set forecast_attr = state_attr('sensor.forecast_solar_energy_production_today', 'forecast') %}
          {% if forecast_attr %}
            {% set max_val = namespace(time='12:00', power=0) %}
            {% for item in forecast_attr %}
              {% if item.pv_estimate | float(0) > max_val.power %}
                {% set max_val.power = item.pv_estimate | float(0) %}
                {% set max_val.time = item.period_start %}
              {% endif %}
            {% endfor %}
            {{ max_val.time }}
          {% else %}
            unknown
          {% endif %}

  - binary_sensor:
      - name: "tomorrow_is_sunny"
        unique_id: tomorrow_is_sunny
        device_class: problem
        icon: mdi:weather-sunny
        state: >
          {{ states('sensor.tomorrow_category') == 'sunny' }}
        availability: >
          {{ states('sensor.tomorrow_category') not in ['unavailable', 'unknown', 'none'] }}

      - name: "good_solar_day_today"
        unique_id: good_solar_day_today
        icon: mdi:solar-power
        state: >
          {% set forecast_today = states('sensor.forecast_solar_energy_production_today') | float(0) %}
          {% set threshold = states('input_number.solar_cloud_day_threshold') | float(5) %}
          {{ forecast_today > threshold }}
        availability: >
          {{ states('sensor.forecast_solar_energy_production_today') not in ['unavailable', 'unknown', 'none'] }}

      - name: "battery_will_fill_from_solar_tomorrow"
        unique_id: battery_will_fill_from_solar_tomorrow
        icon: mdi:battery-charging-100
        # True if solar forecast for tomorrow exceeds battery capacity (9.7 kWh)
        # and is enough to cover average consumption + fill battery
        state: >
          {% set forecast = states('sensor.forecast_solar_energy_production_tomorrow') | float(0) %}
          {% set battery_capacity = 9.7 %}
          {% set avg_consumption = 13.7 %}
          {{ forecast >= (battery_capacity * 0.9) }}
        availability: >
          {{ states('sensor.forecast_solar_energy_production_tomorrow') not in ['unavailable', 'unknown', 'none'] }}

automation:
  # ─────────────────────────────────────────────────────────────────────────────
  # Daily 13:30: adjust grid charging based on solar forecast
  # ─────────────────────────────────────────────────────────────────────────────
  - id: solar_forecast_daily_grid_charge_decision
    alias: "Zonnepaneel: dagelijkse netlaadkeuze op basis van forecast"
    description: >
      At 13:30, evaluates tomorrow's solar forecast to decide whether grid
      charging is beneficial. If battery will fill from solar, disables grid
      charging. If cloudy and battery SOC is low, enables grid charging.
    trigger:
      - platform: time
        at: "13:30:00"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.forecast_solar_energy_production_tomorrow') not in ['unavailable', 'unknown', 'none'] }}
    action:
      - choose:
          # Case 1: Battery will fill from solar → disable grid charging
          - conditions:
              - condition: state
                entity_id: binary_sensor.battery_will_fill_from_solar_tomorrow
                state: "on"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.allow_grid_battery_charge
              - service: notify.mobile_app  # ← replace with your notify service
                data:
                  title: "Forecast: zonnige dag morgen"
                  message: >
                    Morgen {{ states('sensor.forecast_solar_energy_production_tomorrow') | round(1) }} kWh verwacht.
                    Batterij wordt gevuld door zonne-energie. Net-laden uitgeschakeld.
                  data:
                    tag: solar_forecast_sunny

          # Case 2: Cloudy AND battery SOC < 60% → enable grid charging
          - conditions:
              - condition: state
                entity_id: binary_sensor.tomorrow_is_sunny
                state: "off"
              - condition: template
                value_template: >
                  {{ states('sensor.battery_soc_pct') | float(100) < 60 }}
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.allow_grid_battery_charge
              - service: notify.mobile_app  # ← replace with your notify service
                data:
                  title: "Forecast: bewolkte dag morgen"
                  message: >
                    Morgen slechts {{ states('sensor.forecast_solar_energy_production_tomorrow') | round(1) }} kWh verwacht.
                    SoC: {{ states('sensor.battery_soc_pct') | round(0) }}%.
                    Net-laden ingeschakeld voor goedkope uren vanavond.
                  data:
                    tag: solar_forecast_cloudy

          # Case 3: Partly cloudy → leave current setting, just notify
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.tomorrow_category') == 'partly_cloudy' }}
            sequence:
              - service: notify.mobile_app  # ← replace with your notify service
                data:
                  title: "Forecast: bewolkt met opklaringen morgen"
                  message: >
                    Morgen {{ states('sensor.forecast_solar_energy_production_tomorrow') | round(1) }} kWh verwacht (gedeeltelijk bewolkt).
                    Net-laden instelling ongewijzigd: {{ states('input_boolean.allow_grid_battery_charge') }}.
                  data:
                    tag: solar_forecast_partly_cloudy
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 14:00 alert: forecast was good but production is very low (possible fault)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: solar_forecast_production_fault_alert
    alias: "Zonnepaneel: alert bij lage productie ondanks goede forecast"
    description: >
      At 14:00 (solar peak hours), if today was forecast as good/sunny but
      actual production is below 200W, send a fault alert. This may indicate
      inverter shutdown, fault, or panel shading issue.
    trigger:
      - platform: time
        at: "14:00:00"
    condition:
      - condition: state
        entity_id: binary_sensor.good_solar_day_today
        state: "on"
      - condition: numeric_state
        entity_id: sensor.solaredge_i1_ac_power
        below: 200
      - condition: template
        value_template: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown', 'none'] }}
    action:
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "WAARSCHUWING: Lage zonnepaneel productie!"
          message: >
            Goede forecast ({{ states('sensor.forecast_solar_energy_production_today') | round(1) }} kWh),
            maar huidige productie slechts {{ states('sensor.solaredge_i1_ac_power') | round(0) }}W.
            Controleer omvormer en zonnepanelen op fouten.
          data:
            tag: solar_fault_alert
            importance: high
            color: "#ff0000"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Daily solar summary notification at sunset
  # ─────────────────────────────────────────────────────────────────────────────
  - id: solar_daily_summary
    alias: "Zonnepaneel: dagelijkse samenvatting bij zonsondergang"
    description: "Sends a daily solar production summary around sunset."
    trigger:
      - platform: sun
        event: sunset
        offset: "00:30:00"
    condition: []
    action:
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "Dagelijkse energie samenvatting"
          message: >
            ☀️ Productie: {{ states('sensor.daily_solar_production') | round(1) }} kWh
            🏠 Netimport: {{ states('sensor.daily_grid_import') | round(1) }} kWh
            ⚡ Netexport: {{ states('sensor.daily_grid_export') | round(1) }} kWh
            🔋 Batterij: {{ states('sensor.battery_soc_pct') | round(0) }}%
            💶 Prijs nu: {{ states('sensor.energy_price_all_in') | float | round(4) }} €/kWh
          data:
            tag: daily_summary
    mode: single
