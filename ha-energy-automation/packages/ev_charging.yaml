---
# ev_charging.yaml
# Smart EV charging based on Nord Pool prices, solar export, and departure time.
#
# PLACEHOLDER ENTITIES — replace with your actual entity IDs:
#   switch.ev_charger           ← replace with your charger switch (Easee/go-E/Zaptec/Alfen)
#   sensor.ev_state_of_charge   ← replace with your EV SoC sensor
#   binary_sensor.ev_plugged_in ← replace with your EV plugged-in sensor
#
# See docs/ENTITY_NAMES.md for common EV charger entity mappings.

input_number:
  ev_target_soc:
    name: "EV doel laadniveau"
    min: 20
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-charging-high
    initial: 80

  ev_minimum_soc:
    name: "EV minimaal laadniveau (noodladen)"
    min: 10
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-alert
    initial: 20

input_datetime:
  ev_departure_time:
    name: "EV vertrekttijd"
    has_date: false
    has_time: true
    initial: "07:30"
    icon: mdi:clock-time-seven-outline

input_boolean:
  ev_smart_charging_enabled:
    name: "EV slim laden ingeschakeld"
    icon: mdi:car-electric
    initial: true

template:
  - binary_sensor:
      - name: "ev_cheap_charging_hour"
        unique_id: ev_cheap_charging_hour
        icon: mdi:car-electric
        state: >
          {% set price = states('sensor.nord_pool_nl_current_price') | float(999) %}
          {% set limit = states('input_number.ev_cheap_price_limit') | float(0.08) %}
          {{ price < limit }}
        availability: >
          {{ states('sensor.nord_pool_nl_current_price') not in ['unavailable', 'unknown', 'none']
             and states('input_number.ev_cheap_price_limit') not in ['unavailable', 'unknown', 'none'] }}

      - name: "ev_needs_emergency_charge"
        unique_id: ev_needs_emergency_charge
        device_class: battery
        icon: mdi:battery-alert
        state: >
          {% set soc = states('sensor.ev_state_of_charge') | float(100) %}
          {% set min_soc = states('input_number.ev_minimum_soc') | float(20) %}
          {{ soc < min_soc }}
        availability: >
          {{ states('sensor.ev_state_of_charge') not in ['unavailable', 'unknown', 'none'] }}

      - name: "ev_charged_to_target"
        unique_id: ev_charged_to_target
        device_class: battery
        icon: mdi:battery-check
        state: >
          {% set soc = states('sensor.ev_state_of_charge') | float(0) %}
          {% set target = states('input_number.ev_target_soc') | float(80) %}
          {{ soc >= target }}
        availability: >
          {{ states('sensor.ev_state_of_charge') not in ['unavailable', 'unknown', 'none'] }}

      - name: "ev_deadline_charge_needed"
        unique_id: ev_deadline_charge_needed
        icon: mdi:clock-alert
        state: >
          {% set departure = states('input_datetime.ev_departure_time') %}
          {% set soc = states('sensor.ev_state_of_charge') | float(0) %}
          {% set target = states('input_number.ev_target_soc') | float(80) %}
          {% if departure not in ['unavailable', 'unknown', 'none'] %}
            {% set dep_time = strptime(departure, '%H:%M:%S') %}
            {% set now_time = now() %}
            {% set dep_dt = today_at(departure) %}
            {% set hours_until = ((dep_dt - now()) / timedelta(hours=1)) %}
            {{ soc < target and hours_until <= 1 and hours_until > 0 }}
          {% else %}
            false
          {% endif %}

automation:
  # ─────────────────────────────────────────────────────────────────────────────
  # Start charging on cheap window
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_start_charging_cheap_hour
    alias: "EV: laden starten in goedkoop uur"
    description: >
      Starts EV charging when a cheap price window begins, smart charging is
      enabled, car is plugged in, and not yet at target SoC.
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_cheap_charging_hour
        to: "on"
      - platform: state
        entity_id: binary_sensor.cheapest_6_hours_ev
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.ev_smart_charging_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
        state: "on"
      - condition: state
        entity_id: binary_sensor.ev_charged_to_target
        state: "off"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "EV laden gestart"
          message: >
            Goedkoop uur: {{ states('sensor.energy_price_all_in') | float | round(4) }} €/kWh.
            EV SoC: {{ states('sensor.ev_state_of_charge') | round(0) }}% → doel: {{ states('input_number.ev_target_soc') | round(0) }}%
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Start charging on override
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_start_charging_override
    alias: "EV: laden starten bij overschrijving"
    description: "Starts charging immediately when ev_charge_override is turned on."
    trigger:
      - platform: state
        entity_id: input_boolean.ev_charge_override
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
        state: "on"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Emergency charge when SoC is too low
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_start_emergency_charge
    alias: "EV: noodladen starten bij lage SoC"
    description: "Starts charging when EV SoC drops below minimum, regardless of price."
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_needs_emergency_charge
        to: "on"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
        state: "on"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "EV noodladen gestart!"
          message: >
            EV SoC ({{ states('sensor.ev_state_of_charge') | round(0) }}%) is onder het minimum
            ({{ states('input_number.ev_minimum_soc') | round(0) }}%). Laden gestart ongeacht prijs.
          data:
            tag: ev_emergency_charge
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Stop charging when price rises (respect override and emergency)
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_stop_charging_expensive_hour
    alias: "EV: laden stoppen bij hoge prijs"
    description: >
      Stops EV charging when the cheap window ends. Respects override
      and emergency charge conditions.
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_cheap_charging_hour
        to: "off"
      - platform: state
        entity_id: binary_sensor.cheapest_6_hours_ev
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.ev_smart_charging_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.ev_charge_override
        state: "off"
      - condition: state
        entity_id: binary_sensor.ev_needs_emergency_charge
        state: "off"
      - condition: state
        entity_id: binary_sensor.ev_deadline_charge_needed
        state: "off"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Deadline charge: ensure car is charged 1h before departure
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_deadline_charge_before_departure
    alias: "EV: laden voor vertrek op schema"
    description: >
      If car is not at target SoC 1 hour before departure time,
      force-start charging regardless of price.
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_deadline_charge_needed
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
        state: "on"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "EV noodladen voor vertrek"
          message: >
            Minder dan 1 uur tot vertrek ({{ states('input_datetime.ev_departure_time') }}).
            EV SoC: {{ states('sensor.ev_state_of_charge') | round(0) }}% —
            Laden geforceerd om doel te halen.
          data:
            tag: ev_deadline_charge
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Release override when target SoC is reached
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_release_override_target_reached
    alias: "EV: overschrijving vrijgeven bij doel bereikt"
    description: "Automatically turns off ev_charge_override when EV reaches target SoC."
    trigger:
      - platform: state
        entity_id: binary_sensor.ev_charged_to_target
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.ev_charge_override
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ev_charge_override
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "EV doel bereikt"
          message: >
            EV volledig geladen tot {{ states('input_number.ev_target_soc') | round(0) }}%.
            Overschrijving automatisch uitgeschakeld.
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Charge when solar excess > 1500W
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_charge_solar_excess
    alias: "EV: laden met zonne-energie overschot"
    description: >
      When grid export exceeds 1500W (surplus solar after battery is full),
      start EV charging to absorb the excess solar production.
    trigger:
      - platform: numeric_state
        entity_id: sensor.grid_export_w
        above: 1500
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.ev_smart_charging_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
        state: "on"
      - condition: state
        entity_id: binary_sensor.ev_charged_to_target
        state: "off"
      - condition: state
        entity_id: switch.ev_charger  # ← replace with your charger entity
        state: "off"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "EV laden: zonne-energie overschot"
          message: >
            Netexport: {{ states('sensor.grid_export_w') | round(0) }}W.
            EV laden gestart om overschot te benutten.
    mode: single

  - id: ev_stop_charging_solar_excess_ends
    alias: "EV: stoppen na zonne-energie overschot"
    description: "Stops EV charging when solar excess drops below 800W."
    trigger:
      - platform: numeric_state
        entity_id: sensor.grid_export_w
        below: 800
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.ev_smart_charging_enabled
        state: "on"
      - condition: state
        entity_id: binary_sensor.ev_cheap_charging_hour
        state: "off"
      - condition: state
        entity_id: binary_sensor.cheapest_6_hours_ev
        state: "off"
      - condition: state
        entity_id: input_boolean.ev_charge_override
        state: "off"
      - condition: state
        entity_id: binary_sensor.ev_needs_emergency_charge
        state: "off"
      - condition: template
        value_template: >
          {{ states('switch.ev_charger') not in ['unavailable', 'unknown'] }}
    action:
      - service: switch.turn_off
        target:
          entity_id: switch.ev_charger  # ← replace with your charger entity
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Evening reminder if car not plugged in
  # ─────────────────────────────────────────────────────────────────────────────
  - id: ev_evening_reminder_not_plugged_in
    alias: "EV: avondherinnering niet ingeplugd"
    description: "Sends notification at 22:00 if EV is not plugged in."
    trigger:
      - platform: time
        at: "22:00:00"
    condition:
      - condition: state
        entity_id: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
        state: "off"
      - condition: state
        entity_id: input_boolean.ev_smart_charging_enabled
        state: "on"
    action:
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "EV niet ingeplugd"
          message: >
            De auto is niet aangesloten. Vergeet niet in te pluggen voor goedkoop nachtladen.
            Huidige SoC: {{ states('sensor.ev_state_of_charge') | round(0) }}%
          data:
            tag: ev_not_plugged
            actions:
              - action: "URI"
                title: "Open dashboard"
                uri: "/lovelace/energy"
    mode: single
