---
# solaredge.yaml
# Template sensors derived from SolarEdge Modbus Multi integration entities.
# Requires: SolarEdge Modbus Multi (HACS)
# Entity naming follows solaredge_modbus_multi default: solaredge_i1_*, solaredge_m1_*, solaredge_b1_*
# Run the entity discovery template in docs/ENTITY_NAMES.md if your names differ.

# Battery capacity: 9.7 kWh (SolarEdge Home Battery 9.7)
# Inverter: SE10000H (single phase, 10kW)
# Meter: HomeWizard P1 (three-phase, Stedin)
# PV: ~4kWp

template:
  - sensor:
      # ─────────────────────────────────────────────────────────────────────────
      # Power sensors
      # ─────────────────────────────────────────────────────────────────────────
      - name: "solar_production_kw"
        unique_id: solar_production_kw
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {% set ac = states('sensor.solaredge_i1_ac_power') | float(0) %}
          {{ (ac / 1000) | round(3) }}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "house_consumption_w"
        unique_id: house_consumption_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:home-lightning-bolt
        # House consumption = solar production - grid export + grid import - battery (dis)charge
        # Using meter: solaredge_m1_ac_power (positive = import, negative = export)
        # Using battery: solaredge_b1_dc_power (positive = charging, negative = discharging)
        state: >
          {% set solar = states('sensor.solaredge_i1_ac_power') | float(0) %}
          {% set grid = states('sensor.solaredge_m1_ac_power') | float(0) %}
          {% set battery = states('sensor.solaredge_b1_dc_power') | float(0) %}
          {% set consumption = solar + grid - battery %}
          {{ [consumption, 0] | max | round(1) }}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown']
             and states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "grid_power_w"
        unique_id: grid_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower
        # Positive = importing from grid, negative = exporting to grid
        # solaredge_m1_ac_power: positive = import from grid (SE convention)
        state: >
          {{ states('sensor.solaredge_m1_ac_power') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "grid_import_w"
        unique_id: grid_import_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-import
        state: >
          {% set grid = states('sensor.solaredge_m1_ac_power') | float(0) %}
          {{ [grid, 0] | max | round(1) }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "grid_export_w"
        unique_id: grid_export_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-export
        state: >
          {% set grid = states('sensor.solaredge_m1_ac_power') | float(0) %}
          {{ [grid * -1, 0] | max | round(1) }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "battery_power_w"
        unique_id: battery_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        # Positive = charging, negative = discharging
        state: >
          {{ states('sensor.solaredge_b1_dc_power') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_b1_dc_power') not in ['unavailable', 'unknown'] }}

      - name: "battery_soc_pct"
        unique_id: battery_soc_pct
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        icon: mdi:battery
        state: >
          {{ states('sensor.solaredge_b1_state_of_energy') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_b1_state_of_energy') not in ['unavailable', 'unknown'] }}

      - name: "battery_energy_remaining_kwh"
        unique_id: battery_energy_remaining_kwh
        unit_of_measurement: "kWh"
        device_class: energy_storage
        state_class: measurement
        icon: mdi:battery-charging-50
        # Capacity: 9.7 kWh (SolarEdge Home Battery 9.7)
        state: >
          {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(0) %}
          {{ ((soc / 100) * 9.7) | round(2) }}
        availability: >
          {{ states('sensor.solaredge_b1_state_of_energy') not in ['unavailable', 'unknown'] }}
        attributes:
          capacity_kwh: 9.7

      - name: "battery_status"
        unique_id: battery_status
        icon: mdi:battery-sync
        # solaredge_b1_status: 1=Off, 2=Empty, 3=Discharging, 4=Charging, 5=Full, 6=Holding, 7=Testing
        state: >
          {% set status = states('sensor.solaredge_b1_status') | int(0) %}
          {% if status == 1 %}Off
          {% elif status == 2 %}Empty
          {% elif status == 3 %}Discharging
          {% elif status == 4 %}Charging
          {% elif status == 5 %}Full
          {% elif status == 6 %}Holding
          {% elif status == 7 %}Testing
          {% else %}Unknown{% endif %}
        availability: >
          {{ states('sensor.solaredge_b1_status') not in ['unavailable', 'unknown'] }}

      - name: "pv_dc_power_w"
        unique_id: pv_dc_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-panel
        state: >
          {{ states('sensor.solaredge_i1_dc_power') | float(0) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_i1_dc_power') not in ['unavailable', 'unknown'] }}

      - name: "solar_self_consumption_ratio"
        unique_id: solar_self_consumption_ratio
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent
        state: >
          {% set solar = states('sensor.solaredge_i1_ac_power') | float(0) %}
          {% set export = states('sensor.grid_export_w') | float(0) %}
          {% if solar > 10 %}
            {{ (((solar - export) / solar) * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown']
             and states('sensor.grid_export_w') not in ['unavailable', 'unknown'] }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Binary sensors
  # ─────────────────────────────────────────────────────────────────────────────
  - binary_sensor:
      - name: "solar_producing"
        unique_id: solar_producing
        device_class: power
        icon: mdi:solar-power-variant
        state: >
          {{ states('sensor.solaredge_i1_ac_power') | float(0) > 200 }}
        availability: >
          {{ states('sensor.solaredge_i1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "exporting_to_grid"
        unique_id: exporting_to_grid
        device_class: power
        icon: mdi:transmission-tower-export
        state: >
          {{ states('sensor.solaredge_m1_ac_power') | float(0) < -100 }}
        availability: >
          {{ states('sensor.solaredge_m1_ac_power') not in ['unavailable', 'unknown'] }}

      - name: "battery_low"
        unique_id: battery_low
        device_class: battery
        icon: mdi:battery-alert
        state: >
          {% set soc = states('sensor.solaredge_b1_state_of_energy') | float(100) %}
          {% set min_soc = states('input_number.battery_min_soc') | float(10) %}
          {{ soc < min_soc }}
        availability: >
          {{ states('sensor.solaredge_b1_state_of_energy') not in ['unavailable', 'unknown'] }}

      - name: "battery_charging"
        unique_id: battery_charging
        device_class: battery_charging
        icon: mdi:battery-charging
        state: >
          {{ states('sensor.solaredge_b1_dc_power') | float(0) > 50 }}
        availability: >
          {{ states('sensor.solaredge_b1_dc_power') not in ['unavailable', 'unknown'] }}

      - name: "battery_discharging"
        unique_id: battery_discharging
        icon: mdi:battery-arrow-down
        state: >
          {{ states('sensor.solaredge_b1_dc_power') | float(0) < -50 }}
        availability: >
          {{ states('sensor.solaredge_b1_dc_power') not in ['unavailable', 'unknown'] }}

# ─────────────────────────────────────────────────────────────────────────────
# Utility meters
# ─────────────────────────────────────────────────────────────────────────────
utility_meter:
  daily_solar_production:
    name: "Dagelijkse zonnepaneel productie"
    source: sensor.solaredge_i1_ac_energy_kwh  # ← replace with your energy entity
    cycle: daily
    tariffs: []

  monthly_solar_production:
    name: "Maandelijkse zonnepaneel productie"
    source: sensor.solaredge_i1_ac_energy_kwh  # ← replace with your energy entity
    cycle: monthly
    tariffs: []

  daily_grid_import:
    name: "Dagelijkse netimport"
    source: sensor.solaredge_m1_imported_kwh    # ← replace with your grid import entity
    cycle: daily
    tariffs: []

  daily_grid_export:
    name: "Dagelijkse netexport"
    source: sensor.solaredge_m1_exported_kwh    # ← replace with your grid export entity
    cycle: daily
    tariffs: []

  monthly_grid_import:
    name: "Maandelijkse netimport"
    source: sensor.solaredge_m1_imported_kwh    # ← replace with your grid import entity
    cycle: monthly
    tariffs: []

  monthly_grid_export:
    name: "Maandelijkse netexport"
    source: sensor.solaredge_m1_exported_kwh    # ← replace with your grid export entity
    cycle: monthly
    tariffs: []

  daily_battery_charge:
    name: "Dagelijks batterij geladen"
    source: sensor.solaredge_b1_energy_charged  # ← replace with your battery charge energy entity
    cycle: daily
    tariffs: []

  daily_battery_discharge:
    name: "Dagelijks batterij ontladen"
    source: sensor.solaredge_b1_energy_discharged  # ← replace with your battery discharge energy entity
    cycle: daily
    tariffs: []
