---
# energy_prices.yaml
# Nord Pool NL dynamic energy pricing, all-in price calculations,
# AIO Energy Management configuration, helpers, and price-based automations.
# Requires: Nord Pool integration, AIO Energy Management (HACS)

homeassistant:
  customize:
    sensor.energy_price_all_in:
      friendly_name: "All-in energieprijs"
      icon: mdi:currency-eur

input_number:
  battery_min_soc:
    name: "Batterij minimum SoC"
    min: 5
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-low
    initial: 10

  battery_charge_threshold:
    name: "Batterij laden prijsdrempel"
    min: -0.20
    max: 0.20
    step: 0.005
    unit_of_measurement: "€/kWh"
    icon: mdi:lightning-bolt
    initial: 0.05

  ev_cheap_price_limit:
    name: "EV goedkope prijs limiet"
    min: -0.20
    max: 0.30
    step: 0.005
    unit_of_measurement: "€/kWh"
    icon: mdi:car-electric
    initial: 0.08

  network_tariff:
    name: "Netwerktarief (transport)"
    min: 0.00
    max: 0.20
    step: 0.001
    unit_of_measurement: "€/kWh"
    icon: mdi:transmission-tower
    initial: 0.0450

input_boolean:
  allow_grid_battery_charge:
    name: "Toestaan batterij laden van net"
    icon: mdi:battery-charging

  ev_charge_override:
    name: "EV laden overschrijven (altijd laden)"
    icon: mdi:car-electric-outline

template:
  - sensor:
      - name: "energy_price_all_in"
        unique_id: energy_price_all_in
        unit_of_measurement: "€/kWh"
        state_class: measurement
        device_class: monetary
        icon: mdi:currency-eur
        # Formula: spot + energiebelasting (€0.1228/kWh) + BTW 21% + netwerktarief
        # energiebelasting 2024: €0.1228/kWh (excl BTW)
        # BTW 21% over (spot + energiebelasting)
        # network tariff added separately (already incl BTW in most contracts)
        state: >
          {% set spot = states('sensor.nord_pool_nl_current_price') | float(0) %}
          {% set energiebelasting = 0.1228 %}
          {% set btw = 1.21 %}
          {% set network = states('input_number.network_tariff') | float(0.0450) %}
          {% set all_in = ((spot + energiebelasting) * btw) + network %}
          {{ all_in | round(4) }}
        availability: >
          {{ states('sensor.nord_pool_nl_current_price') not in ['unavailable', 'unknown', 'none'] }}
        attributes:
          spot_price: >
            {{ states('sensor.nord_pool_nl_current_price') | float(0) | round(4) }}
          energiebelasting: 0.1228
          btw_factor: 1.21
          network_tariff: >
            {{ states('input_number.network_tariff') | float(0.0450) }}
          price_level: >
            {% set price = states('sensor.energy_price_all_in') | float(0) %}
            {% if price < 0 %}negative
            {% elif price < 0.10 %}very_cheap
            {% elif price < 0.20 %}cheap
            {% elif price < 0.30 %}average
            {% elif price < 0.40 %}expensive
            {% else %}very_expensive{% endif %}

      - name: "energy_price_all_in_sell"
        unique_id: energy_price_all_in_sell
        unit_of_measurement: "€/kWh"
        state_class: measurement
        device_class: monetary
        icon: mdi:currency-eur-off
        # Sell/export price: spot price minus ODE/eb reduction for prosumers
        # Many NL providers pay spot - salderingskorting; approximate as spot * 1.21 - 0.01
        state: >
          {% set spot = states('sensor.nord_pool_nl_current_price') | float(0) %}
          {% set sell_price = spot * 1.21 %}
          {{ sell_price | round(4) }}
        availability: >
          {{ states('sensor.nord_pool_nl_current_price') not in ['unavailable', 'unknown', 'none'] }}

      - name: "cheapest_price_today"
        unique_id: cheapest_price_today
        unit_of_measurement: "€/kWh"
        icon: mdi:tag-arrow-down
        state: >
          {% set prices = state_attr('sensor.nord_pool_nl_current_price', 'today') %}
          {% if prices %}
            {{ prices | min | round(4) }}
          {% else %}
            unknown
          {% endif %}

      - name: "most_expensive_price_today"
        unique_id: most_expensive_price_today
        unit_of_measurement: "€/kWh"
        icon: mdi:tag-arrow-up
        state: >
          {% set prices = state_attr('sensor.nord_pool_nl_current_price', 'today') %}
          {% if prices %}
            {{ prices | max | round(4) }}
          {% else %}
            unknown
          {% endif %}

      - name: "hours_below_threshold_today"
        unique_id: hours_below_threshold_today
        unit_of_measurement: "h"
        icon: mdi:clock-outline
        state: >
          {% set threshold = states('input_number.battery_charge_threshold') | float(0.05) %}
          {% set prices = state_attr('sensor.nord_pool_nl_current_price', 'today') %}
          {% if prices %}
            {{ prices | select('lt', threshold) | list | count }}
          {% else %}
            0
          {% endif %}

  - binary_sensor:
      - name: "price_is_negative"
        unique_id: price_is_negative
        icon: mdi:alert-circle
        state: >
          {{ states('sensor.nord_pool_nl_current_price') | float(0) < 0 }}
        availability: >
          {{ states('sensor.nord_pool_nl_current_price') not in ['unavailable', 'unknown', 'none'] }}

# AIO Energy Management configuration
# Install via HACS: https://github.com/aioenergymanagement/aio-energy-management
aio_energy_management:
  nordpool_entity: sensor.nord_pool_nl_current_price  # ← adjust if your entity differs
  utility_meter_entity: sensor.daily_grid_import       # ← replace with your utility meter

  schedules:
    - name: cheapest_4_hours_overnight
      type: cheapest_hours
      num_hours: 4
      start: "22:00"
      end: "08:00"
      binary_sensor_name: cheapest_4_hours_overnight
      # Creates binary_sensor.cheapest_4_hours_overnight

    - name: most_expensive_4_hours
      type: most_expensive_hours
      num_hours: 4
      start: "06:00"
      end: "23:00"
      binary_sensor_name: most_expensive_4_hours
      # Creates binary_sensor.most_expensive_4_hours

    - name: cheapest_6_hours_ev
      type: cheapest_hours
      num_hours: 6
      start: "20:00"
      end: "08:00"
      binary_sensor_name: cheapest_6_hours_ev
      # Creates binary_sensor.cheapest_6_hours_ev

automation:
  - id: energy_price_negative_alert
    alias: "Negatieve energieprijs melding"
    description: "Stuur een melding wanneer de energieprijs negatief wordt"
    trigger:
      - platform: state
        entity_id: binary_sensor.price_is_negative
        to: "on"
    condition: []
    action:
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "Negatieve energieprijs!"
          message: >
            De spotprijs is nu {{ states('sensor.nord_pool_nl_current_price') | float | round(4) }} €/kWh.
            Overweeg extra verbruik of batterij te ontladen.
          data:
            tag: negative_price
            actions:
              - action: "DISCHARGE_BATTERY"
                title: "Maximaliseer export"
    mode: single

  - id: energy_daily_grid_charge_permission
    alias: "Dagelijkse netsaldo laadtoegang op basis van zonnepaneel forecast"
    description: >
      Controleert elke dag om 13:30 of de volgende dag voldoende zon verwacht wordt.
      Als de zon voldoende is, wordt het laden van het net uitgeschakeld.
      Als de zon onvoldoende is en de prijs laag is, wordt laden van het net ingeschakeld.
    trigger:
      - platform: time
        at: "13:30:00"
    condition: []
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.tomorrow_is_sunny
                state: "on"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.allow_grid_battery_charge
              - service: notify.mobile_app  # ← replace with your notify service
                data:
                  title: "Zonnige dag morgen verwacht"
                  message: >
                    Morgen wordt een zonnige dag ({{ states('sensor.forecast_solar_energy_production_tomorrow') | round(1) }} kWh verwacht).
                    Net-naar-batterij laden is uitgeschakeld.
          - conditions:
              - condition: state
                entity_id: binary_sensor.tomorrow_is_sunny
                state: "off"
              - condition: template
                value_template: >
                  {{ states('sensor.battery_soc_pct') | float(100) < 60 }}
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.allow_grid_battery_charge
              - service: notify.mobile_app  # ← replace with your notify service
                data:
                  title: "Bewolkte dag morgen: net-laden ingeschakeld"
                  message: >
                    Morgen bewolkt ({{ states('sensor.forecast_solar_energy_production_tomorrow') | round(1) }} kWh verwacht).
                    Batterij zal worden geladen van het net tijdens goedkope uren.
    mode: single
