---
# battery_control.yaml
# SolarEdge Home Battery 9.7kWh control automations.
#
# IMPORTANT: Battery automations require:
#   - Home Hub installed and commissioned
#   - SolarEdge Home Battery 9.7 installed and commissioned
#   - Storage controls enabled in SolarEdge Modbus Multi integration
#   - select.solaredge_i1_storage_control_mode available
#   - select.solaredge_i1_storage_default_mode available
#
# Storage control mode options (select.solaredge_i1_storage_control_mode):
#   "Remote Control"          — HA controls the battery directly
#   "Maximize Self Consumption" — inverter controls automatically
#   "Backup Only"             — reserves battery for backup
#   "Charge from PV"          — only charges from solar
#
# Storage default mode options (select.solaredge_i1_storage_default_mode):
#   "Maximize Self Consumption"
#   "Maximize Export"
#   "Charge from PV Only"

# Helper for manual battery mode override
input_select:
  battery_mode_override:
    name: "Batterij modus overschrijving"
    options:
      - auto
      - force_self_consumption
      - force_charge_grid
      - force_discharge
      - charge_pv_only
    initial: auto
    icon: mdi:battery-sync

automation:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Enable Remote Control mode on startup / when battery becomes available
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_enable_remote_control_startup
    alias: "Batterij: Remote Control inschakelen bij opstarten"
    description: >
      Activates Remote Control mode when HA starts or when the storage control
      entity becomes available. Required for all other battery automations.
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: select.solaredge_i1_storage_control_mode
        to: ~
        from: "unavailable"
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
    action:
      - delay: "00:00:30"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Self Consumption"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Charge battery from grid during cheapest overnight hours
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_charge_from_grid_cheap_hours
    alias: "Batterij: laden van net tijdens goedkope uren"
    description: >
      When the cheapest 4-hour overnight window starts AND grid charging is
      allowed AND the battery is not full, set default mode to Maximize Self
      Consumption and allow charging. Guard: checks all entities are available.
    trigger:
      - platform: state
        entity_id: binary_sensor.cheapest_4_hours_overnight
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.allow_grid_battery_charge
        state: "on"
      - condition: template
        value_template: >
          {{ states('sensor.battery_soc_pct') | float(100) < 98 }}
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('input_number.battery_charge_threshold') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('sensor.nord_pool_nl_current_price') | float(999) <
             states('input_number.battery_charge_threshold') | float(0.05) }}
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Self Consumption"
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "Batterij laden van net gestart"
          message: >
            Goedkoop uur gedetecteerd: {{ states('sensor.nord_pool_nl_current_price') | float | round(4) }} €/kWh.
            Batterij wordt geladen van het net. SoC: {{ states('sensor.battery_soc_pct') | round(0) }}%
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Switch to self-consumption when solar is producing and price is positive
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_self_consumption_solar_producing
    alias: "Batterij: zelfverbruik maximaliseren bij zonne-energie"
    description: >
      When solar starts producing (>200W) and the spot price is positive,
      switch to Maximize Self Consumption mode.
    trigger:
      - platform: state
        entity_id: binary_sensor.solar_producing
        to: "on"
        for: "00:05:00"
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.nord_pool_nl_current_price') | float(0) > 0 }}
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('input_select.battery_mode_override') == 'auto' }}
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Self Consumption"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Maximize export during the most expensive hours
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_maximize_export_peak_price
    alias: "Batterij: export maximaliseren tijdens piekprijzen"
    description: >
      When the most expensive 4-hour window starts, switch to Maximize Export
      to sell stored energy at the highest price. Guard: entity availability.
    trigger:
      - platform: state
        entity_id: binary_sensor.most_expensive_4_hours
        to: "on"
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('sensor.battery_soc_pct') | float(0) > 20 }}
      - condition: template
        value_template: >
          {{ states('input_select.battery_mode_override') == 'auto' }}
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Export"
      - service: notify.mobile_app  # ← replace with your notify service
        data:
          title: "Batterij export modus actief"
          message: >
            Piekprijs: {{ states('sensor.energy_price_all_in') | float | round(4) }} €/kWh.
            Batterij SoC: {{ states('sensor.battery_soc_pct') | round(0) }}%
    mode: single

  - id: battery_stop_maximize_export_peak_ends
    alias: "Batterij: stop export maximaliseren na piekperiode"
    description: "Switches back to self-consumption when the expensive window ends."
    trigger:
      - platform: state
        entity_id: binary_sensor.most_expensive_4_hours
        to: "off"
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('input_select.battery_mode_override') == 'auto' }}
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Self Consumption"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Hold battery (Charge from PV only) when EV charger is active
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_hold_during_ev_charging
    alias: "Batterij: vasthouden tijdens EV laden"
    description: >
      When the EV charger is active, switch battery to Charge from PV Only
      to avoid using stored battery energy to charge the car. The EV smart
      charger integration will handle optimal EV charging separately.
    trigger:
      - platform: state
        entity_id: switch.ev_charger  # ← replace with your EV charger entity
        to: "on"
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('input_select.battery_mode_override') == 'auto' }}
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Charge from PV Only"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Resume self-consumption when EV stops charging
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_resume_after_ev_stops
    alias: "Batterij: zelfverbruik hervatten na EV laden"
    description: "When EV charger turns off, resume Maximize Self Consumption."
    trigger:
      - platform: state
        entity_id: switch.ev_charger  # ← replace with your EV charger entity
        to: "off"
        for: "00:02:00"
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('input_select.battery_mode_override') == 'auto' }}
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Self Consumption"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Hourly fallback: reset to self-consumption unless overridden
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_hourly_fallback_self_consumption
    alias: "Batterij: uurlijkse terugval naar zelfverbruik"
    description: >
      Every hour, if no override is active and we're not in a scheduled peak/cheap
      window, ensure the battery is in Maximize Self Consumption mode.
      Acts as a safety net against stuck states.
    trigger:
      - platform: time_pattern
        minutes: "5"
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
      - condition: template
        value_template: >
          {{ states('input_select.battery_mode_override') == 'auto' }}
      - condition: state
        entity_id: binary_sensor.cheapest_4_hours_overnight
        state: "off"
      - condition: state
        entity_id: binary_sensor.most_expensive_4_hours
        state: "off"
      - condition: state
        entity_id: switch.ev_charger  # ← replace with your EV charger entity
        state: "off"
    action:
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_control_mode
        data:
          option: "Remote Control"
      - service: select.select_option
        target:
          entity_id: select.solaredge_i1_storage_default_mode
        data:
          option: "Maximize Self Consumption"
    mode: single

  # ─────────────────────────────────────────────────────────────────────────────
  # Manual override handling
  # ─────────────────────────────────────────────────────────────────────────────
  - id: battery_apply_manual_override
    alias: "Batterij: handmatige modus overschrijving toepassen"
    description: "Applies selected battery mode when input_select changes."
    trigger:
      - platform: state
        entity_id: input_select.battery_mode_override
    condition:
      - condition: template
        value_template: >
          {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.battery_mode_override
                state: "force_self_consumption"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_default_mode
                data:
                  option: "Maximize Self Consumption"
          - conditions:
              - condition: state
                entity_id: input_select.battery_mode_override
                state: "force_discharge"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_default_mode
                data:
                  option: "Maximize Export"
          - conditions:
              - condition: state
                entity_id: input_select.battery_mode_override
                state: "charge_pv_only"
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.solaredge_i1_storage_default_mode
                data:
                  option: "Charge from PV Only"
          - conditions:
              - condition: state
                entity_id: input_select.battery_mode_override
                state: "force_charge_grid"
            sequence:
              - service: script.force_battery_charge_from_grid
    mode: queued
    max: 5
