---
# reset_battery_mode.yaml
# Manual battery control scripts for quick mode switching from the dashboard
# or via service calls.
#
# Storage control entity: select.solaredge_i1_storage_control_mode
# Storage default mode entity: select.solaredge_i1_storage_default_mode

reset_battery_to_self_consumption:
  alias: "Batterij resetten naar zelfverbruik"
  description: >
    Sets Remote Control mode and then Maximize Self Consumption as the default.
    Use this to return to automatic self-consumption after a manual override.
  icon: mdi:battery-sync
  sequence:
    - condition: template
      value_template: >
        {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
    - service: select.select_option
      target:
        entity_id: select.solaredge_i1_storage_control_mode
      data:
        option: "Remote Control"
    - delay: "00:00:02"
    - service: select.select_option
      target:
        entity_id: select.solaredge_i1_storage_default_mode
      data:
        option: "Maximize Self Consumption"
    - service: input_select.select_option
      target:
        entity_id: input_select.battery_mode_override
      data:
        option: "auto"
  mode: single

force_battery_charge_from_grid:
  alias: "Batterij forceren laden van net"
  description: >
    Forces the battery to charge from the grid by switching to Maximize Self
    Consumption with Remote Control (grid charging enabled). Automatically resets
    to self-consumption after 1 hour.
  icon: mdi:battery-charging
  fields:
    duration_minutes:
      description: "Duration to charge from grid (minutes, default 60)"
      default: 60
      selector:
        number:
          min: 15
          max: 240
          unit_of_measurement: min
  sequence:
    - condition: template
      value_template: >
        {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
    - service: select.select_option
      target:
        entity_id: select.solaredge_i1_storage_control_mode
      data:
        option: "Remote Control"
    - delay: "00:00:02"
    - service: select.select_option
      target:
        entity_id: select.solaredge_i1_storage_default_mode
      data:
        option: "Maximize Self Consumption"
    - service: input_select.select_option
      target:
        entity_id: input_select.battery_mode_override
      data:
        option: "force_charge_grid"
    - service: notify.mobile_app  # ← replace with your notify service
      data:
        title: "Batterij laden van net gestart"
        message: >
          Forceer laden van het net voor {{ duration_minutes | default(60) }} minuten.
          Automatisch reset naar zelfverbruik daarna.
    - delay:
        minutes: "{{ duration_minutes | default(60) | int }}"
    - service: script.reset_battery_to_self_consumption
  mode: single

force_battery_discharge:
  alias: "Batterij forceren ontladen (export maximaliseren)"
  description: >
    Sets battery to Maximize Export to discharge the battery and export to the
    grid. Use during high-price periods to maximize revenue.
    NOTE: Only beneficial when export price > current tariff.
    Automatically resets to self-consumption after 2 hours.
  icon: mdi:battery-arrow-down
  fields:
    duration_minutes:
      description: "Duration to maximize discharge/export (minutes, default 120)"
      default: 120
      selector:
        number:
          min: 15
          max: 240
          unit_of_measurement: min
  sequence:
    - condition: template
      value_template: >
        {{ states('select.solaredge_i1_storage_control_mode') not in ['unavailable', 'unknown', 'none'] }}
    - condition: template
      value_template: >
        {{ states('sensor.battery_soc_pct') | float(0) > 20 }}
    - service: select.select_option
      target:
        entity_id: select.solaredge_i1_storage_control_mode
      data:
        option: "Remote Control"
    - delay: "00:00:02"
    - service: select.select_option
      target:
        entity_id: select.solaredge_i1_storage_default_mode
      data:
        option: "Maximize Export"
    - service: input_select.select_option
      target:
        entity_id: input_select.battery_mode_override
      data:
        option: "force_discharge"
    - service: notify.mobile_app  # ← replace with your notify service
      data:
        title: "Batterij export modus gestart"
        message: >
          Maximaliseer export voor {{ duration_minutes | default(120) }} minuten.
          Huidig tarief: {{ states('sensor.energy_price_all_in') | float | round(4) }} €/kWh.
          Batterij SoC: {{ states('sensor.battery_soc_pct') | round(0) }}%
    - delay:
        minutes: "{{ duration_minutes | default(120) | int }}"
    - service: script.reset_battery_to_self_consumption
  mode: single
