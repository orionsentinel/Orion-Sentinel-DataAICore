---
# energy_dashboard.yaml
# ──────────────────────────────────────────────────────────────────────────────
# Energie Dashboard — Lovelace YAML
# Vereiste HACS frontend cards:
#   - Mushroom Cards (lovelace-mushroom)
#   - ApexCharts Card (apexcharts-card)
#   - Mini Graph Card (mini-graph-card)
#
# Om toe te voegen: Instellingen → Dashboards → + Toevoegen → YAML configuratie
# Kopieer de inhoud van dit bestand naar de raw YAML editor.
# ──────────────────────────────────────────────────────────────────────────────

title: "Energie"
path: energie
icon: mdi:lightning-bolt
views:
  - title: "Overzicht"
    path: overview
    type: sections
    max_columns: 3
    sections:

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 1 — Kill switch + systeem gezondheid (bovenaan — altijd zichtbaar)
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 3
        cards:
          - type: horizontal-stack
            cards:
              # Kill switch toggle — GROOT en prominent bovenaan
              - type: custom:mushroom-entity-card
                entity: input_boolean.energy_automation_enabled
                name: "Automaties AAN/UIT"
                icon: mdi:lightning-bolt-circle
                layout: horizontal
                tap_action:
                  action: toggle

              # Systeem gezondheid status
              - type: custom:mushroom-template-card
                primary: >
                  {% set status = states('sensor.system_health_status') %}
                  {% if status == 'OK' %}Systeem OK
                  {% elif status == 'GESTOPT' %}Automaties gestopt
                  {% elif status == 'FOUT_MODBUS' %}Modbus fout
                  {% elif status == 'FOUT_P1' %}P1 meter fout
                  {% elif status == 'FOUT_PRIJZEN' %}Prijzen verouderd
                  {% elif status == 'WAARSCHUWING_ALFEN' %}Alfen sessie verloren
                  {% else %}{{ status }}{% endif %}
                secondary: >
                  {% if is_state('binary_sensor.missing_data_flag', 'on') %}
                    Gegevens ontbreken — automaties geblokkeerd
                  {% else %}
                    Alle bronnen beschikbaar
                  {% endif %}
                icon: >
                  {% set status = states('sensor.system_health_status') %}
                  {% if status == 'OK' %}mdi:check-circle
                  {% elif status == 'GESTOPT' %}mdi:pause-circle
                  {% else %}mdi:alert-circle{% endif %}
                icon_color: >
                  {% set status = states('sensor.system_health_status') %}
                  {% if status == 'OK' %}green
                  {% elif status == 'GESTOPT' %}blue
                  {% else %}red{% endif %}
                layout: horizontal
                tap_action:
                  action: more-info
                  entity: sensor.system_health_status

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 2 — Status chips
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 3
        cards:
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              # Huidige prijs
              - type: template
                icon: mdi:currency-eur
                icon_color: >
                  {% if is_state('binary_sensor.is_negative_price', 'on') %}green
                  {% elif is_state('binary_sensor.is_cheap_hour', 'on') %}light-green
                  {% elif is_state('binary_sensor.is_expensive_hour', 'on') %}red
                  {% else %}yellow{% endif %}
                content: >
                  € {{ states('sensor.energy_price_all_in') | float(0) | round(3) }}/kWh
                  {% if is_state('binary_sensor.is_negative_price', 'on') %} 💚
                  {% elif is_state('binary_sensor.is_cheap_hour', 'on') %} 🟢
                  {% elif is_state('binary_sensor.is_expensive_hour', 'on') %} 🔴
                  {% else %} 🟡{% endif %}
                tap_action:
                  action: more-info
                  entity: sensor.energy_price_all_in

              # Batterij modus
              - type: entity
                entity: input_select.battery_desired_mode
                icon: mdi:battery-sync

              # Batterij SoC + doel
              - type: template
                icon: mdi:battery
                icon_color: >
                  {% set soc = states('sensor.solaredge_b1_soc') | float(0) %}
                  {% if soc > 60 %}green{% elif soc > 30 %}yellow{% else %}red{% endif %}
                content: >
                  {{ states('sensor.solaredge_b1_soc') | float(0) | round(0) }}%
                  (doel: {{ states('sensor.battery_target_soc') | default('?') }}%)
                tap_action:
                  action: more-info
                  entity: sensor.solaredge_b1_soc

              # Arbitrage kans
              - type: template
                icon: >
                  {% if is_state('binary_sensor.arbitrage_opportunity', 'on') %}
                    mdi:chart-line-variant
                  {% else %}
                    mdi:chart-flat{% endif %}
                icon_color: >
                  {% if is_state('binary_sensor.arbitrage_opportunity', 'on') %}green
                  {% else %}grey{% endif %}
                content: >
                  {% if is_state('binary_sensor.arbitrage_opportunity', 'on') %}
                    Arbitrage: {{ states('sensor.price_spread_today') | float(0) | round(3) }}€
                  {% else %}
                    Geen arbitrage
                  {% endif %}
                tap_action:
                  action: more-info
                  entity: binary_sensor.arbitrage_opportunity

              # EV status
              - type: template
                icon: mdi:car-electric
                icon_color: >
                  {% if is_state('binary_sensor.ev_actually_charging', 'on') %}green
                  {% elif is_state('binary_sensor.alfen_car_connected', 'on') %}blue
                  {% else %}grey{% endif %}
                content: >
                  EV {{ states('sensor.ev_soc_display') | int(0) }}%
                  {% if is_state('binary_sensor.ev_actually_charging', 'on') %} ⚡{% endif %}

              # Prijzen vers
              - type: template
                icon: mdi:clock-check
                icon_color: >
                  {% if states('sensor.price_freshness_ok') == 'true' %}green{% else %}red{% endif %}
                content: >
                  {% if states('sensor.price_freshness_ok') == 'true' %}Prijzen vers{% else %}⚠️ Prijzen oud{% endif %}

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 3 — Vermogen huidig (3 kolommen)
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: "Zonne-energie"
            secondary: >
              {{ states('sensor.solaredge_i1_ac_power') | float(0) | round(0) }} W
            icon: mdi:solar-power
            icon_color: >
              {% set power = states('sensor.solaredge_i1_ac_power') | float(0) %}
              {% if power > 5000 %}amber
              {% elif power > 1000 %}yellow
              {% elif power > 50 %}light-green
              {% else %}grey{% endif %}
            tap_action:
              action: more-info
              entity: sensor.solaredge_i1_ac_power

      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: "Net"
            secondary: >
              {% set power = states('sensor.homewizard_p1_active_power_w') | float(0) %}
              {% if power > 0 %}Import: {{ power | round(0) }} W
              {% elif power < 0 %}Export: {{ (power * -1) | round(0) }} W
              {% else %}Geen uitwisseling{% endif %}
            icon: mdi:transmission-tower
            icon_color: >
              {% set power = states('sensor.homewizard_p1_active_power_w') | float(0) %}
              {% if power > 500 %}red
              {% elif power < -500 %}green
              {% else %}blue{% endif %}
            tap_action:
              action: more-info
              entity: sensor.homewizard_p1_active_power_w

      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: "Batterij"
            secondary: >
              SoC: {{ states('sensor.solaredge_b1_soc') | float(0) | round(0) }}%
              {% set power = states('sensor.solaredge_b1_dc_power') | float(0) | round(0) %}
              {% if power > 50 %} (laden +{{ power }}W)
              {% elif power < -50 %} (ontladen {{ power }}W){% endif %}
            icon: >
              {% set soc = states('sensor.solaredge_b1_soc') | float(0) %}
              {% if soc > 80 %}mdi:battery-high
              {% elif soc > 50 %}mdi:battery-medium
              {% elif soc > 20 %}mdi:battery-low
              {% else %}mdi:battery-alert{% endif %}
            icon_color: >
              {% set soc = states('sensor.solaredge_b1_soc') | float(0) %}
              {% if soc > 60 %}green{% elif soc > 30 %}yellow{% else %}red{% endif %}
            tap_action:
              action: more-info
              entity: sensor.solaredge_b1_soc

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 4 — Prijs grafiek
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 3
        cards:
          - type: custom:apexcharts-card
            header:
              title: "Energieprijzen (all-in €/kWh)"
              show: true
              show_states: true
            graph_span: 36h
            span:
              start: hour
              offset: "-12h"
            now:
              show: true
              label: "Nu"
            series:
              - entity: sensor.energy_price_all_in
                name: "All-in prijs"
                type: column
                color: "#3498db"
                opacity: 0.85
                extend_to: false
              - entity: sensor.nord_pool_nl_current_price
                name: "Spotprijs"
                type: line
                color: "#e74c3c"
                stroke_width: 2
                extend_to: false
            yaxis:
              - id: price
                decimals: 3
                title: "€/kWh"
            apex_config:
              chart:
                height: 220
              plotOptions:
                bar:
                  columnWidth: 95%

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 5 — Batterijbeheer (2 kolommen)
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 2
        cards:
          - type: entities
            title: "Batterijbeheer"
            icon: mdi:battery-sync
            entities:
              - entity: input_select.battery_desired_mode
                name: "Gewenste modus"
              - entity: sensor.battery_mode_reason
                name: "Reden"
              - entity: sensor.battery_target_soc
                name: "Doel SoC (dynamisch)"
              - entity: sensor.battery_energy_available_kwh
                name: "Beschikbare energie"
              - entity: input_boolean.allow_grid_battery_charge
                name: "Laden van net toegestaan"
              - entity: binary_sensor.arbitrage_opportunity
                name: "Arbitrage kans"
              - entity: sensor.price_spread_today
                name: "Prijsspreiding vandaag"
              - entity: binary_sensor.battery_change_allowed
                name: "Wijziging toegestaan (5min rate limit)"
              - entity: input_number.battery_charge_price_threshold
                name: "Laad drempel spot"
              - entity: input_number.battery_min_soc
                name: "Minimum SoC"
              - entity: input_number.arbitrage_min_spread
                name: "Min. arbitrage spreiding"

      - type: grid
        column_span: 1
        cards:
          - type: vertical-stack
            cards:
              - type: button
                name: "SELF CONSUME"
                icon: mdi:battery-sync
                tap_action:
                  action: call-service
                  service: script.reset_battery_to_self_consumption
              - type: button
                name: "FORCE CHARGE 1h"
                icon: mdi:battery-charging
                tap_action:
                  action: call-service
                  service: script.force_battery_charge_1h
              - type: button
                name: "HOLD"
                icon: mdi:battery-lock
                tap_action:
                  action: call-service
                  service: script.hold_battery
              - type: button
                name: "FORCE DISCHARGE"
                icon: mdi:battery-arrow-down
                tap_action:
                  action: call-service
                  service: script.force_battery_discharge

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 6 — EV laden
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 2
        cards:
          - type: entities
            title: "EV Laden"
            icon: mdi:car-electric
            entities:
              - entity: binary_sensor.alfen_car_connected
                name: "Auto aangesloten"
              - entity: binary_sensor.ev_actually_charging
                name: "Aan het laden"
              - entity: sensor.alfen_wallbox_active_power_total
                name: "Laadvermogen"
              - entity: sensor.alfen_wallbox_energy_session_kwh
                name: "Energie deze sessie"
              - entity: sensor.ev_soc_display
                name: "EV SoC"
              - entity: sensor.ev_charge_hours_needed
                name: "Laaduren nodig"
              - entity: input_boolean.ev_smart_charging_enabled
                name: "Slim laden aan"
              - entity: input_boolean.ev_charge_override
                name: "Handmatig override"
              - entity: binary_sensor.alfen_change_allowed
                name: "Wijziging toegestaan (10min rate limit)"
              - entity: input_number.ev_target_soc
                name: "Doel SoC"
              - entity: input_number.ev_minimum_soc
                name: "Minimum SoC (nood)"
              - entity: input_datetime.ev_departure_time
                name: "Vertrektijd"

      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Alfen Sessie"
            icon: mdi:ev-station
            entities:
              - entity: binary_sensor.alfen_wallbox_https_api_login_status
                name: "Sessie actief"
              - type: button
                name: "Sessie vrijgeven"
                icon: mdi:lock-open
                tap_action:
                  action: call-service
                  service: script.alfen_release_session
              - type: button
                name: "Sessie terugvorderen"
                icon: mdi:lock
                tap_action:
                  action: call-service
                  service: script.alfen_reclaim_session

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 7 — Apparaten + Zonne-energie prognose
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 1
        cards:
          - type: entities
            title: "Apparaten"
            icon: mdi:washing-machine
            entities:
              - entity: binary_sensor.cheapest_4h_overnight
                name: "Goedkoopste 4u actief"
              - entity: input_boolean.washer_overnight_queued
                name: "Wasmachine gepland"
              - entity: input_boolean.dishwasher_overnight_queued
                name: "Vaatwasser gepland"
              - entity: input_boolean.dryer_overnight_queued
                name: "Droger gepland"

      - type: grid
        column_span: 2
        cards:
          - type: entities
            title: "Zonne-energie Prognose"
            icon: mdi:weather-sunny
            entities:
              - entity: sensor.solar_forecast_tomorrow_kwh
                name: "Prognose morgen (kWh)"
              - entity: sensor.solar_forecast_category
                name: "Categorie"
              - entity: binary_sensor.battery_will_fill_naturally
                name: "Batterij vult vanzelf"
              - entity: sensor.battery_grid_topup_needed_kwh
                name: "Net aanvulling nodig (kWh)"
              - entity: binary_sensor.good_solar_day_today
                name: "Goede zondag vandaag"

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 8 — Dagelijkse statistieken
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 3
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: "Vandaag opgewekt"
                secondary: >
                  {{ states('sensor.daily_solar_production') | float(0) | round(2) }} kWh
                icon: mdi:solar-power
                icon_color: yellow

              - type: custom:mushroom-template-card
                primary: "Net import"
                secondary: >
                  {{ states('sensor.daily_grid_import') | float(0) | round(2) }} kWh
                icon: mdi:transmission-tower-import
                icon_color: red

              - type: custom:mushroom-template-card
                primary: "Net export"
                secondary: >
                  {{ states('sensor.daily_grid_export') | float(0) | round(2) }} kWh
                icon: mdi:transmission-tower-export
                icon_color: green

              - type: custom:mushroom-template-card
                primary: "EV geladen"
                secondary: >
                  {{ states('sensor.daily_ev_charged') | float(0) | round(2) }} kWh
                icon: mdi:car-electric
                icon_color: blue

              - type: custom:mushroom-template-card
                primary: "Energiekosten (est.)"
                secondary: >
                  € {{ states('sensor.daily_energy_cost_eur') | float(0) | round(2) }}
                icon: mdi:cash
                icon_color: purple

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 9 — Vermogens geschiedenis (Mini Graph)
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 3
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.solaredge_i1_ac_power
                name: "Zon"
                color: "#f1c40f"
              - entity: sensor.homewizard_p1_active_power_w
                name: "Net (pos=import)"
                color: "#e74c3c"
              - entity: sensor.solaredge_b1_dc_power
                name: "Batterij (pos=laden)"
                color: "#2ecc71"
              - entity: sensor.alfen_wallbox_active_power_total
                name: "EV"
                color: "#3498db"
            name: "Vermogen afgelopen 6 uur"
            hours_to_show: 6
            points_per_hour: 12
            line_width: 2
            smoothing: true
            show:
              labels: false
              points: false
              legend: true

      # ═════════════════════════════════════════════════════════════════════════
      # SECTION 10 — Systeemgezondheid detail
      # ═════════════════════════════════════════════════════════════════════════
      - type: grid
        column_span: 3
        cards:
          - type: entities
            title: "Systeem Gezondheid"
            icon: mdi:heart-pulse
            entities:
              - entity: sensor.system_health_status
                name: "Status"
              - entity: binary_sensor.missing_data_flag
                name: "Gegevens ontbreken"
              - entity: binary_sensor.modbus_available
                name: "Modbus verbinding"
              - entity: binary_sensor.p1_available
                name: "P1 meter"
              - entity: binary_sensor.alfen_available
                name: "Alfen verbinding"
              - entity: binary_sensor.battery_hardware_available
                name: "Batterij hardware"
              - entity: sensor.price_freshness_ok
                name: "Prijzen vers"
              - entity: input_text.system_last_alert
                name: "Laatste systeemmelding"
              - entity: input_text.battery_last_action
                name: "Laatste batterijactie"
              - entity: input_text.ev_last_action
                name: "Laatste EV actie"
