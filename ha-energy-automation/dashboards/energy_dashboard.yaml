---
# energy_dashboard.yaml
# Full Lovelace energy dashboard using Mushroom Cards, ApexCharts Card, Mini Graph Card.
# Install via HACS:
#   - Mushroom Cards: https://github.com/piitaya/lovelace-mushroom
#   - ApexCharts Card: https://github.com/RomRider/apexcharts-card
#   - Mini Graph Card: https://github.com/kalkih/mini-graph-card
#
# Paste in HA: Settings → Dashboards → [+] → Paste YAML or use raw config editor.

title: Energie
path: energy
icon: mdi:solar-power
background: ''
views:
  - title: Overzicht
    path: overview
    type: sections
    max_columns: 3
    sections:
      # ───────────────────────────────────────────────────────────────────────
      # Section 1: Status chips row
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                icon: mdi:solar-power
                icon_color: >
                  {% if states('sensor.solar_production_kw') | float(0) > 2 %}
                    amber
                  {% elif states('sensor.solar_production_kw') | float(0) > 0.2 %}
                    yellow
                  {% else %}
                    grey
                  {% endif %}
                content: "{{ states('sensor.solar_production_kw') | float | round(1) }} kW"
                tap_action:
                  action: more-info
                  entity: sensor.solar_production_kw

              - type: template
                icon: mdi:battery
                icon_color: >
                  {% set soc = states('sensor.battery_soc_pct') | float(0) %}
                  {% if soc > 80 %}green
                  {% elif soc > 40 %}yellow
                  {% elif soc > 20 %}orange
                  {% else %}red{% endif %}
                content: "{{ states('sensor.battery_soc_pct') | float | round(0) }}%"
                tap_action:
                  action: more-info
                  entity: sensor.battery_soc_pct

              - type: template
                icon: mdi:currency-eur
                icon_color: >
                  {% set price = states('sensor.energy_price_all_in') | float(0) %}
                  {% if price < 0 %}green
                  {% elif price < 0.15 %}light-green
                  {% elif price < 0.25 %}yellow
                  {% elif price < 0.35 %}orange
                  {% else %}red{% endif %}
                content: "{{ states('sensor.energy_price_all_in') | float | round(3) }} €/kWh"
                tap_action:
                  action: more-info
                  entity: sensor.energy_price_all_in

              - type: template
                icon: mdi:transmission-tower
                icon_color: >
                  {% set grid = states('sensor.grid_power_w') | float(0) %}
                  {% if grid < -100 %}green
                  {% elif grid < 100 %}blue
                  {% else %}red{% endif %}
                content: >
                  {% set grid = states('sensor.grid_power_w') | float(0) %}
                  {% if grid < 0 %}↑ {{ (grid * -1) | round(0) }} W
                  {% elif grid > 0 %}↓ {{ grid | round(0) }} W
                  {% else %}0 W{% endif %}
                tap_action:
                  action: more-info
                  entity: sensor.grid_power_w

              - type: template
                icon: mdi:car-electric
                icon_color: >
                  {% if states('switch.ev_charger') == 'on' %}blue
                  {% elif states('binary_sensor.ev_plugged_in') == 'on' %}green
                  {% else %}grey{% endif %}
                content: >
                  {% set soc = states('sensor.ev_state_of_charge') %}
                  {% if soc not in ['unavailable', 'unknown'] %}
                    {{ soc | float | round(0) }}%
                  {% else %}
                    --
                  {% endif %}
                tap_action:
                  action: more-info
                  entity: sensor.ev_state_of_charge

      # ───────────────────────────────────────────────────────────────────────
      # Section 2: Solar / Battery / Grid flow cards
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: Zonne-energie
            secondary: "{{ states('sensor.solar_production_kw') | float | round(2) }} kW"
            icon: mdi:solar-power-variant
            icon_color: >
              {% if states('binary_sensor.solar_producing') == 'on' %}amber
              {% else %}grey{% endif %}
            badge_icon: >
              {% if states('binary_sensor.exporting_to_grid') == 'on' %}mdi:transmission-tower-export{% endif %}
            badge_color: green
            tap_action:
              action: more-info
              entity: sensor.solar_production_kw

      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: Batterij
            secondary: >
              {{ states('sensor.battery_soc_pct') | float | round(0) }}%
              ({{ states('sensor.battery_energy_remaining_kwh') | float | round(1) }} kWh)
            icon: >
              {% set soc = states('sensor.battery_soc_pct') | float(0) %}
              {% if soc > 90 %}mdi:battery
              {% elif soc > 70 %}mdi:battery-80
              {% elif soc > 50 %}mdi:battery-60
              {% elif soc > 30 %}mdi:battery-40
              {% elif soc > 10 %}mdi:battery-20
              {% else %}mdi:battery-alert{% endif %}
            icon_color: >
              {% set soc = states('sensor.battery_soc_pct') | float(0) %}
              {% if states('binary_sensor.battery_charging') == 'on' %}blue
              {% elif states('binary_sensor.battery_discharging') == 'on' %}orange
              {% elif soc > 60 %}green
              {% elif soc > 25 %}yellow
              {% else %}red{% endif %}
            badge_icon: >
              {% if states('binary_sensor.battery_charging') == 'on' %}mdi:battery-charging
              {% elif states('binary_sensor.battery_discharging') == 'on' %}mdi:battery-arrow-down{% endif %}
            tap_action:
              action: more-info
              entity: sensor.battery_soc_pct

      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: Net
            secondary: >
              {% set grid = states('sensor.grid_power_w') | float(0) %}
              {% if grid > 0 %}Import: {{ grid | round(0) }} W
              {% elif grid < 0 %}Export: {{ (grid * -1) | round(0) }} W
              {% else %}Geen stroom{% endif %}
            icon: mdi:transmission-tower
            icon_color: >
              {% set grid = states('sensor.grid_power_w') | float(0) %}
              {% if grid < -100 %}green
              {% elif grid > 500 %}red
              {% else %}blue{% endif %}
            tap_action:
              action: more-info
              entity: sensor.grid_power_w

      # ───────────────────────────────────────────────────────────────────────
      # Section 3: ApexCharts price chart (today + tomorrow, 36h)
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              title: Energieprijzen (spotprijs) — vandaag + morgen
              show_states: true
              colorize_states: true
            now:
              show: true
              label: Nu
              color: red
            graph_span: 36h
            span:
              start: day
            series:
              - entity: sensor.nord_pool_nl_current_price
                name: Spotprijs (€/kWh)
                type: column
                color: >
                  {% if states('sensor.nord_pool_nl_current_price') | float(0) < 0 %}
                    '#00c853'
                  {% elif states('sensor.nord_pool_nl_current_price') | float(0) < 0.10 %}
                    '#69f0ae'
                  {% elif states('sensor.nord_pool_nl_current_price') | float(0) < 0.20 %}
                    '#ffeb3b'
                  {% else %}
                    '#ff5722'
                  {% endif %}
                data_generator: |
                  const today = entity.attributes.today ?? [];
                  const tomorrow = entity.attributes.tomorrow ?? [];
                  const combined = [...today, ...tomorrow];
                  const start = new Date();
                  start.setHours(0, 0, 0, 0);
                  return combined.map((price, i) => [
                    start.getTime() + i * 3600000,
                    price
                  ]);
                unit: €/kWh
              - entity: sensor.energy_price_all_in
                name: All-in prijs
                type: line
                color: orange
                stroke_width: 2

      # ───────────────────────────────────────────────────────────────────────
      # Section 4: Mini graph cards — production history and consumption
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: custom:mini-graph-card
            name: Zonnepaneel productie
            icon: mdi:solar-power
            entities:
              - entity: sensor.solaredge_i1_ac_power
                name: AC vermogen
                color: '#ffb300'
            hours_to_show: 24
            points_per_hour: 4
            line_color: '#ffb300'
            line_width: 2
            hour24: true
            show:
              labels: true
              points: false
              fill: true

          - type: custom:mini-graph-card
            name: Huisverbruik
            icon: mdi:home-lightning-bolt
            entities:
              - entity: sensor.house_consumption_w
                name: Verbruik
                color: '#7e57c2'
            hours_to_show: 24
            points_per_hour: 4
            line_color: '#7e57c2'
            line_width: 2
            hour24: true
            show:
              labels: true
              points: false
              fill: true

      # ───────────────────────────────────────────────────────────────────────
      # Section 5: Daily totals and battery management controls
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 3
        cards:
          - type: entities
            title: Dagelijkse energie totalen
            icon: mdi:chart-bar
            entities:
              - entity: sensor.daily_solar_production
                name: Zonnepaneel productie vandaag
                icon: mdi:solar-power
              - entity: sensor.daily_grid_import
                name: Netimport vandaag
                icon: mdi:transmission-tower-import
              - entity: sensor.daily_grid_export
                name: Netexport vandaag
                icon: mdi:transmission-tower-export
              - entity: sensor.battery_energy_remaining_kwh
                name: Batterij energie
                icon: mdi:battery
              - type: divider
              - entity: sensor.energy_price_all_in
                name: Huidige all-in prijs
                icon: mdi:currency-eur
              - entity: sensor.nord_pool_nl_current_price
                name: Huidige spotprijs
                icon: mdi:lightning-bolt
              - type: divider
              - type: section
                label: Batterijbeheer
              - entity: input_boolean.allow_grid_battery_charge
                name: Net-naar-batterij laden toestaan
                toggle: true
              - entity: input_select.battery_mode_override
                name: Batterij modus overschrijving
              - entity: input_number.battery_charge_threshold
                name: Laadprijsdrempel
              - entity: input_number.battery_min_soc
                name: Minimum SoC
              - entity: select.solaredge_i1_storage_default_mode
                name: Huidige opslagmodus

      # ───────────────────────────────────────────────────────────────────────
      # Section 6: EV charging and appliance scheduling
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: entities
            title: EV Laden
            icon: mdi:car-electric
            entities:
              - entity: switch.ev_charger  # ← replace with your charger entity
                name: EV lader
                toggle: true
              - entity: binary_sensor.ev_plugged_in  # ← replace with your plugged-in sensor
                name: EV ingeplugd
              - entity: sensor.ev_state_of_charge  # ← replace with your SoC sensor
                name: EV laadniveau
              - type: divider
              - entity: input_boolean.ev_smart_charging_enabled
                name: Slim laden ingeschakeld
                toggle: true
              - entity: input_boolean.ev_charge_override
                name: Altijd laden (overschrijving)
                toggle: true
              - entity: input_number.ev_target_soc
                name: Doellaadniveau
              - entity: input_number.ev_minimum_soc
                name: Minimum laadniveau
              - entity: input_datetime.ev_departure_time
                name: Vertrekttijd

          - type: entities
            title: Apparaten schema
            icon: mdi:washing-machine
            entities:
              - entity: input_boolean.appliances_smart_scheduling
                name: Slim schema ingeschakeld
                toggle: true
              - type: divider
              - entity: input_boolean.washing_machine_pending
                name: Wasmachine inplannen
                toggle: true
                secondary_info: last-changed
              - entity: input_boolean.dishwasher_pending
                name: Vaatwasser inplannen
                toggle: true
                secondary_info: last-changed
              - entity: input_boolean.dryer_pending
                name: Droger inplannen
                toggle: true
                secondary_info: last-changed
              - type: divider
              - entity: binary_sensor.cheapest_4_hours_overnight
                name: Goedkope nachtperiode actief
              - type: section
                label: Slimme stekkers
              - entity: switch.washing_machine_smart_plug  # ← replace with your entity
                name: Wasmachine stekker
                toggle: true
              - entity: switch.dishwasher_smart_plug  # ← replace with your entity
                name: Vaatwasser stekker
                toggle: true
              - entity: switch.dryer_smart_plug  # ← replace with your entity
                name: Droger stekker
                toggle: true

      # ───────────────────────────────────────────────────────────────────────
      # Section 7: Solar forecast status cards
      # ───────────────────────────────────────────────────────────────────────
      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: Forecast vandaag
            secondary: >
              {{ states('sensor.forecast_solar_energy_production_today') | float | round(1) }} kWh
            icon: mdi:weather-sunny
            icon_color: >
              {% if states('binary_sensor.good_solar_day_today') == 'on' %}amber
              {% else %}blue-grey{% endif %}
            tap_action:
              action: more-info
              entity: sensor.forecast_solar_energy_production_today

      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: Forecast morgen
            secondary: >
              {{ states('sensor.forecast_solar_energy_production_tomorrow') | float | round(1) }} kWh
              ({{ states('sensor.tomorrow_category') }})
            icon: >
              {% set cat = states('sensor.tomorrow_category') %}
              {% if cat == 'sunny' %}mdi:weather-sunny
              {% elif cat == 'partly_cloudy' %}mdi:weather-partly-cloudy
              {% else %}mdi:weather-cloudy{% endif %}
            icon_color: >
              {% set cat = states('sensor.tomorrow_category') %}
              {% if cat == 'sunny' %}amber
              {% elif cat == 'partly_cloudy' %}yellow
              {% else %}blue-grey{% endif %}
            tap_action:
              action: more-info
              entity: sensor.forecast_solar_energy_production_tomorrow

      - type: grid
        column_span: 1
        cards:
          - type: custom:mushroom-template-card
            primary: Net-laden status
            secondary: >
              {% if states('input_boolean.allow_grid_battery_charge') == 'on' %}
                Ingeschakeld
              {% else %}
                Uitgeschakeld
              {% endif %}
            icon: mdi:battery-charging
            icon_color: >
              {% if states('input_boolean.allow_grid_battery_charge') == 'on' %}green
              {% else %}grey{% endif %}
            tap_action:
              action: toggle
              entity: input_boolean.allow_grid_battery_charge
