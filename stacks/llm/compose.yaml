# Orion-Sentinel-DataAICore - LLM Stack
# Ollama + Open WebUI for local AI interactions
#
# Profile: llm
#
# Usage:
#   ./scripts/orionctl up llm
#
# To edit this file:
#   sudo nano stacks/llm/compose.yaml
#
# Access:
#   Open WebUI: http://${HOST_IP}:3000
#
# Pull models:
#   ./scripts/pull-model.sh llama3.2:3b

services:
  # ============================================================================
  # OLLAMA
  # Local LLM inference engine
  # ============================================================================

  ollama:
    image: ollama/ollama:latest
    container_name: orion_dataaicore_ollama
    restart: unless-stopped
    profiles:
      - llm
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0}
    volumes:
      - ${DATA_ROOT:-/srv/orion/dataaicore}/llm/ollama:/root/.ollama
    # Internal only by default - Open WebUI connects via Docker network
    # Uncomment to expose Ollama API to LAN:
    # ports:
    #   - "${HOST_IP:-0.0.0.0}:11434:11434"
    expose:
      - "11434"
    networks:
      - dataaicore_internal
    security_opt:
      - no-new-privileges:true
    # GPU Support (NVIDIA):
    # To enable GPU acceleration, uncomment BOTH sections below:
    # 1. Environment variable:
    # environment:
    #   NVIDIA_VISIBLE_DEVICES: all
    # 2. Deploy resources:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # OPEN WEBUI
  # ChatGPT-like interface for Ollama
  # ============================================================================

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: orion_dataaicore_openwebui
    restart: unless-stopped
    profiles:
      - llm
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Europe/Amsterdam}
      # Ollama backend (internal Docker network)
      OLLAMA_BASE_URL: http://ollama:11434
      # WebUI settings
      WEBUI_NAME: "Orion AI"
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-true}
      # Web search integration (SearXNG)
      # Configure in UI: Settings → Web Search → SearXNG
      # URL: http://searxng:8080
      ENABLE_RAG_WEB_SEARCH: "true"
      RAG_WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>&format=json"
      # Disable features not needed in Phase 1
      ENABLE_IMAGE_GENERATION: "false"
      ENABLE_RAG_LOCAL_WEB_FETCH: "false"
    volumes:
      - ${DATA_ROOT:-/srv/orion/dataaicore}/llm/openwebui:/app/backend/data
    ports:
      - "${HOST_IP:-0.0.0.0}:3000:8080"
    networks:
      - dataaicore_internal
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dataaicore_internal:
    name: dataaicore_internal
    external: true
