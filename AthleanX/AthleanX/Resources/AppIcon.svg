<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: deep black with subtle rounded square shape -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="#0A0A0A"/>

  <!-- Red gradient background glow -->
  <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#E53935" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bgGlow)"/>

  <!-- ATHLEAN-X wordmark: bold, stacked, red accent on X -->
  <!-- "ATHLEAN" text -->
  <text
    x="512"
    y="400"
    font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="148"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="8">ATHLEAN</text>

  <!-- Divider line -->
  <rect x="160" y="430" width="704" height="3" rx="2" fill="#E53935" opacity="0.6"/>

  <!-- "-X" with red X -->
  <text
    x="512"
    y="590"
    font-family="'Helvetica Neue', 'Arial Black', Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="200"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="0">-<tspan fill="#E53935">X</tspan></text>

  <!-- Lightning bolt accent (bottom right of X) -->
  <g transform="translate(712, 540) scale(0.55)" opacity="0.9">
    <!-- Bolt shape: classic sharp lightning bolt -->
    <polygon
      points="40,0 10,55 35,55 0,110 70,45 44,45"
      fill="#E53935"/>
    <polygon
      points="40,0 10,55 35,55 0,110 70,45 44,45"
      fill="url(#boltGrad)"
      opacity="0.6"/>
  </g>

  <!-- Gradient for bolt highlight -->
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
  </defs>

  <!-- Subtle bottom label -->
  <text
    x="512"
    y="780"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="52"
    fill="#888888"
    text-anchor="middle"
    letter-spacing="14">PORTAL</text>
</svg>
